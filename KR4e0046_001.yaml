body:
  text: 草澤狂歌卷一明王恭撰五言古方氏日趣軒端居適清暇愛此林中屋晼晚田圃間優遊會心目春風始萌達秋草萋已緑玄蟬號樹枝嵗事已聞促始自感物候終然媚幽獨物淡境自忘心間意方足浮榮豈不顧安命良無欲緬懷柴桑人臨風佇芳躅張良進履嬴君震六合侯國日已隳區區相韓心忠憤不得施道逢龎眉叟感激心內知屈體但長跪忍性能自卑丈夫有遠略小節寧顧之殷勤袖簡册可為王者師終然辟榖去永與赤松期秪今圯橋道千載令人思紀夢假寐登九疑遙遙見湘君文螭與赤豹颯沓何紛紛掩瑟泣幽怨行招虞帝魂青楓洞庭氣白雨瀟湘昏鑾輿覆華蓋招搖爛埀雲我見未及跪六龍忽飛奔欲陳腹中事哽咽不得言覺來北忩曙月落啼清猿逢楚上人客有紫霞想行尋白雲峯自期名仙會適與髙人逢邂逅展良晤優遊企髙蹤絲桐屬清響石林聞霜鐘旬時積隂靄海色浮空濛清旦麗初旭孤帆别匆匆秋山緑蘿月何日與君同稽山懷古遙遙稽山雲淡淡鏡湖水雲水兩無心千秋亦相似憶昔金門人黃冠此山裏恩榮闕但得遂初志蘭亭何岧嶤修竹猶深邃欲識斯人居寂寞山隂是我來弔遺蹤臨風寫幽意惻愴更何言落日猿聲起賦得凌霄花寄友人凌霄産朱夏因依鬱青蒼引蔓絓髙樹垂隂近中堂炎風媚朝景暑雨濕紅芳容華難久恃採折空自傷欲寄同心者道遠川無梁諒非松柏操佇立徒慨慷夏日過周六園林因有茶瓜之會盛夏日方永端居憶登臨同袍四五輩共愛嘉樹林一徑入幽僻蒼蒼羣木隂脫巾坐石榻拂石絃五琴泠泠澗泉水婉婉山鳥音葷酒亦易致茶瓜非外尋以茲有佳趣聊用忘歸心書雲山小景岩壑昨夜雨千峯霽朝色白雲何方來相對淡孤寂人煙帶長林僧宇鄰蛟室落景天際帆青山鳥邉宅思同靜者論相期在蘿薜梅城小景滄江湛回流荒城出花嶼海色明遠洲嵐光過新雨漁家孤笛秋煙火踈林暮漠漠天際帆蒼蒼鳥邉樹若人靜者流持竿得真趣取樂非取魚日斜忘歸去春夜懷同袍友春夜不能寐起坐彈吾琴泠泠七絃上感激懷知音微雨半簾靜孤燈千里心故人不可見况此别來深幽期詎可即夢裏能相尋送人中秋闈歸莆中治世竟先達英材惟陸機秋闈况得意復憶家林歸落日江上别涼風吹客衣壺山鬱蔥倩莆水清漣漪為言到家日未幾登王畿無令得桂手虛負看花時談笑青雲上誰念山中期樵父詞生不適州縣采薪南山岑窮年事登陟辛苦力不任濯足清澗水息肩垂蘿隂落日晚獨還微風動謳吟唯應鹿門隱可以諧我心秋夜宿石門洞勝寄越籌嶺霽心投翠微隂林見法侣盡夕留松扉石門發天聲海月澄秋衣風泉有餘響倐爾清塵機願言托香界信宿以忘歸新秋有懷梧桐覆金井鏡水澄秋碧商颷忽來過一葉涼蕭索落葉尚號蟬芳山復鳴鵙夕露生我衣天河夜深白惆悵思遠人滄洲坐來隔與同志泛舟得練字日夕山水佳揚舲劇歡燕雲光落妓叉露氣侵紈扇遂結鮫人居仍窮水晶殿微月天際來澄波靜如練古鏡妾有蟠龍鏡秦王在時見繡澀隱菱花蒼蒼蝕蟲篆浮雲薄太清孤月沈秋練從此知妾心何由見君面蘭畹蘭生被九畹葳蕤凌衆芳風泛紫英秀露滋雲葉涼蕺之以為佩何必珩與璜常恐雪霰集將隨蕭艾荒相思在元澧日夕空倣徨書靈山法堂香臺隱鷲峯鐘聲雲蘿深半壁見燈影虛空聞梵音忍草被幽石靈花曜陽林唯應虎溪水可以清塵心題東華觀壁林館隱空青鳥外三花夕藥草半庭間煙蘿數峯碧隂林絶行蹤曠古多靈迹獨鶴天際還寒流月中白偶與仙人期塵心坐來息越城聞笛朝登清泠臺夜宿無諸郭羌笛何處來梅花夢中落悲涼關月寒凄斷秋山薄不是别離人聞爾亦蕭索南山塔晚眺層標際飛翠落日懸孤嶂霜降羣山殘天秋百泉響夕鳥澄遠心歸雲發遐想願言謝塵埃復此丘中賞言懷拂鬱坐空宇蕭索鴻雁鳴涼霜襲飛幔北斗當前楹撫劒中夜起空歌感平生聊持一樽酒獨酌懷吾貞古來曠達者豈願身後名原陵久已沒此懷為誰傾山齋遣懷雨後山意間孤吟葛衣薄淑風散松香幽景變林壑飛雲淡而歸宿鳥欣有托誰歟大夢間擾擾獨先覺仲尼羈旅人伯陽遁西漠大聖古且然吾氓任蕭索黃金爾何為適此悔吝作服食不願餘晨炊飽藜藿水墨山水楓林翠微裏暝色川已澄巖芳晴冒雪澗緑淺流氷仙賞淡舟處猿聲青葛藤永懷不可即雲月下清泠秋谷飛雲圖仙賞夙所慕幽期行獨尋清耀在巾舄微聞丘中琴流水淡孤興歸雲間遠心從茲謝朝市永極煙蘿深贈何秀才東海有佳士被服美且都厲節抗時貴法言驚世儒淵玄五經旨纚纚若貫珠管葛為之攝儀秦為之愚黃金作髙臺可置七尺軀惜哉時不遇落拓如凡夫其二涼颷革炎熾孤雲薄層隂油然起膚寸倐爾為甘霖志士藴經濟優遊樂山林時來適所遇泛若雲無心斯情永在眷此道將誰任世復賤荆璞人猶貴黃金黔婁固窮者千載無知音挽晉安何文學被役卒遼東故鄉寧不死嗟爾沒邉州野水遼天遠寒山海樹秋芳城書店悄殘日繐帷幽惆悵吞聲别誰堪久淚流哭亡友陳一訃聞君欲死驚定淚沾衣梁獄書徒上秦臺鏡亦非恨深淮草緑魂遠越山微從此無期會間宵夢爾歸草澤狂歌卷一
