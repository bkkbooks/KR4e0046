body:
  text: 草澤狂歌卷三明王恭撰五言律詩九日落葉滿秋山親朋杳靄間江村多雨外世難幾人還白髮偏能長黃花好是閒聊將一杯酒暫爾解離顔寄别陳大坐罪之京師淚沾行子衣不得顧庭闈祖席君難醉朋簮我獨違風波千里别淮海幾人歸賸把鄉書寄新秋有雁飛偕陳處士宿桓山禪室次韵探幽識靈境習靜愛古剎林風落曇花山翠濕衣葛心空愜道腴神清悟禪悅髙興殊未窮殘鐘下微月遊桓山寺水木通禪觀清遊却忘還風泉衣上落魚鳥鏡中閒緑髮縱教變青雲未可攀超然人境外何必市朝間三溪似陳澄清書幌連溪曲春流拂樹過野花雲際落山色鳥邉多薄分違纓冕幽情變薜蘿欣逢魯中叟談笑復如何留别海上陳文學瀛海東風後壺山夕鳥邉相逢花歷歷恨别草芊芊細雨延春酌疏燈耿夜眠眀朝江浦上何處復懷賢又客思已凄凄鉤輈雨外啼家林歸夢積村路獨行迷島樹看成霧林花踏作泥辭君理行櫂萍水又東西送馮生被役荆蠻迢遞荆蠻路君行亂我心楚山南去遠湘水北流深鄉望秋中樹邉城雨外砧窮荒人少到音問抵南金送造士盧紀京貢官栁拂行塵孤城帶遠人海天殘雪夜京樹入懷春白髮相知少青山獨夢頻斯文應未泯行矣莫羞貧暮春贈别方陳二公遊泉城惆悵又分襟江亭酒緩斟桐花衣上雨楊栁笛中音醉憶平原劒間銷季子金五陵鞍馬盡恐負少年心初秋露坐有感夜蟬鳴露葉林館候初凉髮逐秋風變愁分漢水長一身天地窄五口嵗時荒山魅無情極聞余應斷腸滄洲雜詠中賦得蟾蜍水滴三足斂精耀置君書案頭願輸涓滴清助爾文墨優顧兔未同羣闕蛙非與儔無因反月窟千載從一作傍滄洲題鄭氏家藏古畫凉雨净氛壒孤雲結層隂飛流激芳澗嘉木澄幽林鳥啼谷中趣人閒川上心誰為後來者當期此投簮夏日遊靈瑞寺鶴石孤峯轉龍宫古道斜如何在人境别自有仙家流水仙梯近歸雲覺路賖勝遊須永日何必在生涯二蘭若當生處經過憶舊林樹回青嶂合門掩白雲深野烏啼禪榻清池淨客心終悲城市裏人事日相侵三蕭王宫殿古髙構軼浮埃山遠人行少江空潮自來濕雲沾野榻飛鳥上經臺自愧紅塵縛無因共酒杯四古寺鄰江島蒼茫紫翠間斷雲連野寺孤鳥沒空山酒榼穿花入禪扉映竹關幸陪巾舄醉日暮始言還古塞下曲雲中今已平軍士凱歌聲天地邊塵沒關山漢月明洗兵秋度磧牧馬夜歸營多少還家夢中原有弟兄二十二羽林郎橫弓事朔方陳雲遮塞月殺氣墮邊霜戰苦隂山黑兵殘落日黃長驅射鵰手生繫左賢王三幾戰交河北天山暗雪花橫戈辭漢月驅馬入陰沙窮漠依深壘殘兵慘暮笳風塵殊未息鄉國慢咨嗟送人奉使日本扶桑東海際望望水雲深曉月都門别秋風别使心魚龍驚漢節獠蛋貢南琛且復勤王去歸朝早賜金過冶城尋芝山蘭若訪從兄闡上人梵宇相逢處依依憶斷行佛香雲近榻禪寂鳥窺房粥茗留清晝鐘魚出上方空門多割愛猶解惜蓮芳夏日喜故人見宿林居清夜靜喜與故人期卷幔凉先入深池影自移挑燈間對酒掃榻坐聫詩眀發天涯别重來是幾時題前山過雨灝氣集雲壑羣峯微雨晴商颷起蘋末木葉澄秋聲山色依孤櫂天寒潮信平滄浪有清處可以濯吾纓題馬圖龍種來何處流沙路不窮自矜千里駿曾取二師功影入天池月聲嘶御道風只今憐駿逸誰數玉花驄初夏寫懷春歸南苑曙孤思倦登樓野樹青殘雨江雲白遠洲鳥啼驚物換草緑伴人愁獨有龍泉劒光芒射斗牛西岩庵前小池西岩春池小泠泠隱翠微虛圓窺色相恬淡印禪機雨積龍泉古波澄鳥影稀塵纓從此濯相對欲忘歸擬唐髙適送鄭侍御謫閩閩川今謫去惆悵復離羣别夢逢京雨愁心住楚雲猿聲閩樹遠帆影越江分聖主恩波重多才不棄君經冶城尋芝山蘭若訪從兄闡上人蘭若三山下相逢慰所思支離驚落葉留戀惜連枝境靜禪皆寂身空病不疑自憐塵土隔徒有鶺鴒悲寒山過雨圖落葉塞鴻秋澄江湛不流數峯殘雨外獨樹斷雲頭暝色浮僧磬寒光入釣舟向來濯纓處迢遞隔滄洲漁隱自無簮組分結屋近苔磯夜月懸孤艇寒潮入半扉溪山曾無趣魚鳥已忘機為問青雲者誰能忍布衣殘夏懷西岩舊隱關河暑漸收池館欲迎秋忽憶山中事偏懷靜者流焚香依曉榻洗鉢動寒湫苦被紅塵縛何期到上頭送僧歸日本滄波杳無際望望入扶桑杖錫遊何處歸途信一航龍宫朝洗鉢鮫室夜焚香法侣遙相待松枝偃舊房遊靈瑞寺偶賦白雲精舍近一路入迢遙古壁留殘靄微鐘送暮潮鳥啼空翠晚花落斷香飄此地堪攜興何須度石橋經漂母墓寂寞淮隂路荒城接楚原誰能懷漂母曾此飯王孫孤塜今猶在千金不復論自慚非國士茲去向何門擬唐韋應物賦得暮雨送李胄江城分手處夕雨更沈沈野樹含滋色層峯沒翠岑空濛關塞遠飄泊海門深送别情無限絲絲淚染襟經爐峯蘭若迢遞孤峯裏空門偶獨行野雲隨杖屨古木帶簷楹月出禪初定僧間鳥自鳴興闌歸自晚鐘磬有餘聲山水圖半幅生綃裏分眀見遠山斷橋分瀑溜古木隱岩巒野色烟中沒孤雲鳥外還幽栖如此得何必市朝間二山水無窮趣看圖憶勝遊葉藏雲外塔風穩闕舟岩際隱遙月藤隂下碧流從茲得佳賞何日去瀛洲三山水愜幽盟蕭蕭薜荔情天邉孤嶂遠鳥外白雲橫野衲聞猿坐山人伴鹿耕看圖應不厭疑是輞川行枯木野木臨崖石年深土亦崩老根浮斷蘚飛幹接長藤性朽空勞匠心灰也類僧春風幾榮謝羡爾獨稜層贈别畫史林虛白歸嶼南憐君心不羈水墨始清竒瀟灑南宫態空濛北苑姿壺觴傾邂逅岐路惜分離後夜分遙憶猿啼海樹枝武夷山訪道投簮尋羽客山水慢亭清九曲烟霞色數峯鐘磬聲還丹飛九轉仙篋受長生寂寂藤蘿外惟聞鸞鶴鳴齊居喜故人陳希召過仍送别云相思飛鳥外海樹共春雲岐路誰知己空齊獨見君故情猶戀戀别思又紛紛相送無窮恨壺山向夕曛泊舟武昌孤舟隨鳥沒漸至楚王城黃鶴久飛去髙樓空復情嶽陽春樹歇漢口夏雲生鸚鵡芳洲近凄凉待月升題猿鹿圖丹青翠微裏猿鹿共幽間掛影寒潭外群遊落照間養茸尋藥圃得樹入雲閒年少無游獵山林恣往還晚濟龍門渡因訪髙慢士向夕龍門渡風潮半落霞暫停遊子棹得訪故人家浦口魚罾近津頭酒幔斜踟蹰那忍去乘月涉江沙夜泛臺江無諸古城外潮滿合沙洲賔從留驄馬壺觴度彩舟山回川夜月猿怨海雲秋寂寞屠龍事臺空江自流送客還薊丘江南春草歇斗酒送歸程别路閩山色鄉園易水聲嶺雲遊子恨邉栁故關情握手自茲去空聞征雁鳴經故人墳東城日將曙驅馬入寒雲無復平生友空餘數尺墳卧麟行鳥跡斷碣積苔紋欲薦寒泉水臨風涕泗紛喜嶼南景霞子兄弟見過林家好兄弟清潤比璠璵海嶼耕殘業天壇夢舊居相逢三徑草清話一樓書莫遣明朝别思君恨有餘贈醫者仙醫何處住賣藥到山城嵗月壺中度人烟醉裏行杏林春樹曉橘井野泉清已飲上池水何論指下眀題靈瑞招提連峯入翠微海色上行衣寺古殘僧少林空野鳥稀幽花燃石洞芳草沒山扉盡醉壺中物長歌送夕暉誦道經盥濯宴心坐焚香講道經青童開寶笈白髮對黃庭玉佩飛鸞馭瑤笙載鶴軿天花撩亂處迢遞見仙靈玉樞經有天花繽紛語送鄰人葬卜鄰今幾年此别間黃泉灑淚臨長道招魂若箇邉夜臺春寂寂蒿里樹芊芊歸路東城晚誰家思管絃四月東湖泛舟落日東湖裏相攜著綵舟澄明憐水物浩蕩狎沙鷗載妓從歌舞飛觴任去留緑荷深處月流影上滄洲山人入城翠微行漸遠去去入城扉斷續人烟近荒凉故舊稀市廛沾草屨官栁拂荷衣惟有空濛水東流無是非久雨後湖堤散步偕三同志湖上雨新晴相將著屨行葛衣沾野色紈扇引波聲吟響魚皆聽機忘鳥不驚隔林村路晚歸興月初明避暑林幽行避暑藤葉晝隂隂地僻無行客山深獨抱琴白雲時在屨流水始知音寄語塵中者同來共息心三山送客歸錢塘分手螺江上青山驛路長嶺雲添别恨關月照行裝浙水金鱗活西湖白藕香羡君從此去調膳上髙堂遠浦帆歸寂歷釣魚磯青山帶夕暉天邉飛鳥絶浦口一帆歸花嶼鴻聲小蓬忩月色微叩舷間獨坐忘却白鷗機二浦漵沿村曲孤帆一片秋風移篷裏軸影拂水邉樓鼓枻驚初雁鳴弦起夕鷗江湖波浪緊幸喜見安流夏夜聞笛露坐空庭夕遙峯片月眀誰將楊栁調吹作鳳凰鳴思繞坡仙夢聲隨嬴女情舊遊寧再得聞此轉悲生二誰截湘南管晴樓午夜吹數聲孤月下獨客斷腸時零落梅花片蕭條楊栁枝天明漢江上何處覓桓伊贈隱者赴召鶴書天上去迢遞到山城獨賦驪駒别空懷薜荔情吳中爭騎逺淮上一帆輕漸到金門下君應被寵榮二習靜東山裏空林閉兩扉獨承丹陛詔暫解緑蘿衣猿鹿誰同伴烟霞跡漸稀五雲霄漢上還有夢來期訪山人不值迢遞過前峯林深爽氣濃也知行處盡猶未與君逢白壁猿啼榻空潭樹翳鍾不知人代裏何日得相從二山中尋舊侣何事掩荆扉樹密藤花落籬深菜草稀蕭條人不見寂寞鳥空歸葉上留名去孤雲與願違林塘夏夕有懷同志風微池色定林靜藕花香深樹歸殘鳥青山斂夕陽同心嗟逺道久别隔他鄉世事今如此何因共舉觴書雲山小景遠樹緑依依澄江去棹微人烟連極浦僧舍對殘暉山迥雲來白林深客到稀紅塵多少事即此可忘機夏夜舟中暑氣夕仍熾澄江思夜遊孤舟乘楚月醉客發吳謳漁浦鐘初斷楓林火漸收雞鳴看海色城闕復堪愁送人下第歸桐城如君寧久微且復顧庭闈折桂暫無分飄蓬今獨歸壺公當過道金粟待行衣遙想青燈下間堂靜掩扉冶城馬上䇿馬三山路經過似勝遊千門烟竈曉獨樹釣臺秋雁塔天邉小孤帆鳥外愁晚來燈火起鐘鼓鳳池頭山路見落花野花垂嶺口無主亦芳菲色映林僧帽香隨木客衣凄凉猿折去零落鳥銜歸日暮行人絶山風吹更飛漁樵清話礪斧出幽林移竿野水深相逢休問姓偶坐便知心岩桂香堪爨江鱗美易尋平生山水趣終不為朝簮登鳳山仙人梯磴道蒼苔古緣雲上石梯依微殘雨雪迢遞拂雲霓乍可臨仙路誰堪駐馬蹄回看煉丹處岩畔草萋萋二鳳山東海際蒼翠白雲封峭壁懸梯近幽林挂瀑重虹霓侵絶澗星漢接危峯不見燒丹者空憐避世蹤贈别友人之長沙太守聞說長沙郡湘南驛路微楚山猿亂叫湘水雁孤飛見月鳴琴坐行春佩印歸憐君五馬貴自笑緑蘿衣織婦草蟲鳴促織深夜動鳴機玉手挑燈暗羅衫染淚微常懷筐篚貢又憶塞垣衣用盡閨中力天邉雁未歸王昭君行旌入塞垣回首望君門漢月牽愁思邊塵慘淚痕琵琶霜外曲羌笛夜中魂惆悵氊廬下空聞刺刺言經山中舊宅行行林路遠此地復傷懷斷壁懸疏蔓間門翳古苔鄰僧驚獨住野老候重來欲去仍回首猿聲處處哀贈講僧吾師能演法往往落天花諦聽來何處筌蹄付作家三闕翻貝葉雙樹拂袈裟早晚離言說空潭有月華題王孫挾彈圖金衣騎小駟迢遞茂陵山接鶻花邉過鳴鞭栁外還斷猿驚羽箭過雁落金丸歸醉瓊樓夕天街雪正寒林下逢僧林中見緇錫相問始知名對坐松聲晚澄心澗影清談空歸妙法說有愧勞生月出從分别惟聞山鳥鳴山莊獨夜獨坐空窗裏幽泉入户鳴山林甘寂寞風月共凄清夜半猿聲斷空庭燭影眀蕭條松葉下纓冕不關情夏月過周六園林因有茶瓜之會森爽鳳山裏林幽暑自移幸無塵外事應有靜中期鳥觸牽風幔猿投宿露枝茶瓜並異味隨興且淹遲獨酌言懷行歌與醉吟誰識一生心白日蹉跎過青山感慨深酒酣空擊筑愁極少知音且盡壺中物仙源何處尋山行聞樵歌樵歌何處響迢遞白雲深嫋嫋潭邉起蕭蕭空外音何須諧律吕即此是謳吟却厭青樓曲商音攄暮林過皇恩寺上國僧遊去山門日自開紺園依緑草畫壁上蒼苔谷暗猿初斷林空鶴又回惟餘舊童子笑問客何來燈下寫懷獨坐山忩裏燈殘欲二更月中山葉墮階下草蟲鳴風便遙鐘響霜寒獨自驚青雲猶未達徒此悵離情梅城雪夜夜靜潮聲遠城髙月影寒梅花孤角斷燈火幾家殘楓葉愁中落鄉林夢裏看天眀倚霜樹雲水浩漫漫寒村隱者谷口微霜度寒村獨見君西風見蕭瑟落葉不堪聞古路無行客間門有白雲為憐幽處好不忍更輕分秋江送行者殘栁緑依依離樽對夕暉斷鴻隨去櫂落葉映行衣楚國烟中盡淮山鳥外微宦遊終在客嵗晚早言歸秋中九日登南樓海上登臨望荒城水亂流天邉孤嶂雨烟外幾家秋近郭寒砧響長沙落雁愁鄉心正無那回首仲宣樓秋日送僧還山中西風殘葉下錫杖返東潯浮世空傷别孤雲不住心人烟飛鳥絶山月斷猿深後夜相思處惟聞鐘磬音搗衣獨抱清砧冷那堪搗夜闌淚飄雙杵落愁絶一燈殘烟月閨中趣風霜塞上寒年年空寄遠相憶恨漫漫九日鳳山載酒九日鳳山路登臨喜盍簮風飄烏帽落雲度菊杯深樹色殘孤笛鴻聲帶遠砧醉來同藉草不覺夕陽沈秋江獨釣蕭條驚葉墮孤坐子陵灘積水搖棕樹微風揚竹竿雁催秋色晚霜降笛聲寒釣罷行來夕楓橋日又殘秋暮寄山中人水國催寒早霜風幾夜砧懷君隱居處落葉亂山深野鳥無遺路孤雲不繫心懸知燈火夕間坐聽猿吟秋山行旅客路青山外蕭條盡白雲猿啼山寂寂霜降葉紛紛野寺鳴烟磬空林帶夕曛望鄉心未巳殘笛不堪聞都門留别都門霜葉赤車馬正紛紛祖帳黃花酒孤舟日暮雲龍池初月上長樂曙鐘聞落羽悲紛去懷君鵷鷺羣初冬登南樓樓隱青楓外南天葉未霜寒山低度鳥芳岸入斜陽復嘆年光暮空憐鬢髮蒼故園三徑晚歸笑醉壺觴江城暮角何處玉龍鳴寒江帶楚城梅花天外落客淚夜中傾思苦胡霜入聲凄漢月眀湘南多謫宦誰是不關情寒山送客相送空林下千峯鳥外微寒風飛去斾野燒帶行衣谷口遙鐘度天涯遠騎歸知君愁此别應念故人稀鳴砧寄友人候館空垂幔荒城又搗砧寒聲霜外落愁思夜中深響度銀燈暗清和玊漏音同袍嗟久别因此惜驚心松林觀瀑圖瀑布懸空青初陽互眀滅噴壁飛白虹穿林散晴雪淙淙鶴夢清灑灑機心絶相顧濯塵纓滄波坐超越冶城客夜鐘斷夜色寒孤吟客衣薄月色半城虛砧聲四鄰作更殘酒氣微坐久燈花落乘興理歸帆四望無諸郭送黃山翁還玉融十載一相逢幾日滄洲客祖道又傷離勞歌復愁積孤雲赴岩阿獨鶴鳴川澤歸去黃山中希君醉時墨獨酌言懷林居絶輪鞅獨酌形亦忘百年會衰朽一室任荒凉寤寐友千古遊心見羲皇所以陶潛翁頽然卧柴桑秋塘曲妾身在寒塘夫壻平原客白馬五陵遊空閨斷行跡憶昨别君時蒲生栁條碧及此君不歸登艫感秋色寄上清王道人間齊淡無營忽念山中侣鶴馭杳難期瑤笙竟何處心懷九轉丹夢繞三花樹矯首望孤雲飛聲寄𤣥圃書上清方壺醉墨山水林下多白雲溪口繞水木長嘯鸞鶴群翛然在空谷悠悠山色間浩浩波光緑寄醉墨壺中惟應道機熟春登御風臺寂歷芳臺古天空野望長雨晴間樹出雪盡粵山蒼露蘚凝寒翠烟花送斷香御風人不見徒此立斜陽二雁峯晴翠裏臺古獨登臨沙阜人烟積山城海戍深野雲飄杖舄林吹拂衣襟仙路無期達空驚弔古心間居喜故人見過幽獨空林下荒齊喜見君掃苔聊共坐剪韭更論文華髮掃青鏡浮名寄白雲綈袍如有意慎勿又離羣二寂寞卧空齊間扉閉緑苔一簾幽夢斷千里故人來野竹迷連騎空花送酒杯又愁分手去心事向誰裁送僧遊吳遠師何處去迢遞别東林浙水人烟積吳門雨雪深寒山孤燭影建業暮鐘音處處應留偈懸知不住心與醫者遇詩以贈之長桑親受訣復飲上池清賣藥寧論價還山尚隱名杏林春露積桔井野泉平見遇能醫國何辭纓冕榮經鄱陽舟中作揚帆渡彭蠡雲樹曉冥冥潮到潯陽白山連建業青乾坤隨去鳥江海任流萍回首鄉林遠歸鴻不可聽登雁山望太常峯有懷所知雁山青翠裏遙見太常峯勝槩無期到幽人何處逢仙源雲縹眇秪苑樹䝉茸興盡獨歸去空林聞暮鐘贈道省親獨鸐下三天吹笙度紫烟道心飛鳥外親舍白雲邉丹脉調香飯霞衣拂夀筵更教人代裏何處覓神仙送邑令秩滿之天官天南望帝畿迢遞入銓闈作縣三年别趨朝幾日歸楚江帆漠漠淮岸馬騑騑想是龍池上香名是爾稀六平峯山送人之吳斗酒臨長驛孤帆半夕陽花催離思急栁引醉歌長楚樹兼雲遠吳江到海蒼六平山下路何日更持觴田家喜晴田家當惜雨積雨轉傷苗詰旦雲猶濕新晴潦漸消迅雷潛地底初日映山椒預卜豐年兆何應答聖朝送人使邉漢節下青冥邉人望使星繡衣辭鳳闕驄馬入龍亭雪淨胡天緑春回塞草青須令月支長函表到王庭仲夏五日遊盤石盤石臨湖面凉風薜荔清酒酣山鳥狎曲度水龍聽興極飛蘭櫂神遊到玉瓶不知湘木上飄泊為誰醒二盤石蒼山口歡游重盍簮酒醒荷氣瓊雲斷水容隂畫楫浮空迥青娥隔雨深懷沙千古事誰是獨清心詠荔枝憶昔開元日繁華御裏看玉環天上去無復到長安香沁瓊漿冷紅垂火劑團九重思玉食馳貢未應難懷畫史林景時故人何處住獨樹孟家鄰水墨今誰重雲泉我共貧襟期多古意交態任時人醉裏從揮灑無錢奉老親二木墨人皆羡承平祗布衣雲山隨處寫鄉樹暫時歸兩地愁看月孤村獨掩扉幽期應早計何事久相違與同志泛舟得江字浦口齊橈樂滄波泛玉缸雲歸山㸃㸃天碧鳥雙雙蚌月凉生夜魚風響渡江興來須劇飲無使寸心降送友人伸䝉岩讀書籌峯烟磬裏君去獨垂帷散帖林中晚懸燈雨外微書聲連澗水人影落苔衣不獨伸䝉子辛勤似者稀送人赴秋闈凉露滴宫槐黃花映古苔秋風芹泮别曙日棘闈開戰勝應誰敵名香得意回知君經濟手不愧子雲才贈武夷僧武夷山水好潭影空禪心掛袖雲生石翻經月照林履行隨竹靜鉢洗向泉深九江仙源裏惟聞鐘磬音仲秋洪山經狂客墓狂客今何在風流世共傳夜臺依宿草隴樹入新烟月冷延陵劒湖空賀監船秋風正搖落回首獨澘然贈道人别塵中那久住飛佩入千山片石松邉住孤雲鶴上還苔深丹竈緑葉墜紫宫間後夜𤣥洲月相思杳藹間題美人吹簫圖可憐嬴氏女粉繪若平生無復乘鸞偶空餘弄玉名隔花疑解語橫笛恍聞聲却憶秦樓月偏關獨客情僧房秋夜寂寂空門掩三花隱亂峯經殘僧入定林暝鶴歸松境靜天香入簾疏月影重永懷禪榻夜無夢到塵蹤寄建上客建水接閩關連峯鳥外間魚商墟市遠蝦菜野橋灣烟火舟中飯鄉林夢裏還年年貪利涉不道解離顏月下聞琴空林微月出花下一琴橫忽聽宫商調而多山水情雲邉孤雁斷秋外百泉鳴坐久長河沒猶餘靈籟聲擬題古山寺靈源飛鳥外崱頂翠䝉茸雪覆經春葉雲殘渡壑鐘逢僧留半偈習靜愛中峯自笑紅塵裏誰能寄遠蹤和王摩詰山居即事韵寥寥人境外間坐愛晴暉谷轉猿聲迥林幽鳥影稀雨深苔蘚壁潭映薜蘿衣日夕忘機處孤雲去復歸老將還鄉百戰解重圍三邊受鐵衣蕭條關塞别迢遞故鄉歸舊業春苗發青山白髮稀獨憐間夜夢猶繞羽林飛夜寒曲霜葉冷颼颼鴉啼井上樓轆轤哀響斷蟋蟀夜深愁繡被蘭香滅銀筝雁影流相思紅燭盡敲碎玉搔頭暮秋太常峯掃松楸迢遞孤峯裏含情對古丘苔碑空鳥跡山葉帶猿愁野燒泉門夕寒花隴樹秋臨風一澆酒回首淚雙流文石漁家海國春鴻外人烟盡木鄉潮生孤嶼沒月出白沙凉夜火鄰鮫室雲帆拂蠣房從來少耕種辛苦坐滄浪題鷲峯廢寺鷲嶺鬱蒼蒼香臺出上方苔花侵佛像荔葉滿僧房禪榻餘殘靄鐘樓半夕陽空門無色相何必嘆凄凉送道士還山中仙臺飛鳥外灌木隱琳宫歸路多瑤草還山盡錦峯浴舟臨野水飛珮入寒松愧我紅塵裏空憐絶世蹤擬早朝鐘鼓金門曙千官列雁行西山含落月北闕映初陽御栁蓬萊色宫花太液香袖中有三䇿思欲上君王山中即事習靜當幽處間扉隱翠微林間聞鳥近雲際見人稀曲洞留殘雪髙岩掛落暉遙知銅墨貴不羡薜蘿衣暮春餞别官栁拂晴烟情多又别筵且傾寒食酒將贈繞朝鞭遠樹青雲外孤帆夕鳥邉明朝相憶處兩地聽啼鵑暮春羇懷旅館春將盡鄉心醉不迷人烟隨去住萍梗任東西花落吳山暮鴻歸楚樹低解鞍空佇立無那子規啼送僧省親空門恩愛稀欲去省庭闈親舍無期别白雲長自飛浮杯尋故里洗鉢見春暉莫遣紅塵裏人烟涴衲衣間居寫興幽棲青嶂下塵事少相侵亦有漁樵樂而無纓冕心竹間書幌淨花泛墨池深醉卧雲蘿下機忘鳥自吟山路聞鷓鴣朝入翠微畔鉤輈雨外鳴聲聲行不得去去若為情苦竹湘南驛黃茅嶺外程鄉心正無那聞爾淚沾纓擬唐賈島題李疑幽居仍次韵愛爾幽棲處清凉水竹園遠山頻對酒芳草獨開門卷幔通雲影橫琴拂石根仙源只如此相對更何言山行逢故人墳繫馬荒林下蕭條對古墳傷心逢斷碣揮淚讀遺文宿草今誰泣清猿不可聞空餘三尺劒落日掛楸枌山寺讀書贏糧尋翠巘負笈入琳林書映藤蘿色聲隨鐘梵音藝香孤鳥外燈影斷猿深寂寂空門夜間窺往聖心二聲聲連梵音人影與禪心散帙維摩室懸燈支遁林靈花開户落法雨下帷深洙泗東流去真源何處尋寄衣曲孤月照庭闌相思剪合歡淚從燈燭下霜入闕寒絶漠闕遠空閨錦帳殘慿君封裹裏誰為著時看夏夜寄宿僧房薄暮中峯裏遙聞仙梵音獨尋鐘磬逺漸至薜蘿深月色虛禪室泉聲到客簪誰知慧燈影于此照塵心寄馬秀才下第歸鄉闈不得意秋卷自呈親共恨持衡手空憐泣玊人拂衣楓葉冷歸櫂菊花新擢秀非難取長歌泮水春春隂海國東風後千門積曙隂斷雲隨雨薄歸雁帶烟深栁暗迷征騎花寒笑客簮翻憐勝遊地愁絶五陵心宫鶯宫漏曉沈沈間關百囀音聲隨天樂下色借御袍深栁外窺殘黛花間識墮簮長門終日閉聞爾獨關心暮春都門送客四牡正騑騑承恩出帝畿五門宫漏斷千里布帆飛烟火吳山遠鶯花楚樹稀過門應暫住不久換春衣新燕烏衣何處别迢遞落春塘舊壘逢新主空簾見夕陽水芹沾嘴活烟栁拂衣香何必吳宫樹秋風亦斷腸寒食登臨山水空青處烟蘿鳥道邉千門初禁火獨樹已啼猿㳙溜和清唱飛花拂綺筵回首古城下新塜草芊芊宫井甃石長門裏虛圓一鑑清銀床苔蘚積絲綆轆轤鳴淡泊如恩淺清泠似妾眀鉛華空自照惆悵若為情田家留客爨突曙烟新蠶房絶四鄰相逢江上路且醉甕頭春稚子摘紅葉家人烹紫鱗感君情獨厚應不笑家貧送春緑樹海邊樓年光逝水流向來攜手處誰是少年游池草生還夢林花落更愁若為送春去吟髮又成秋贈故人陳孟敷牧安陸州還鄉能幾日五馬又騑騑闕下陳三䇿人間望一麾帆飛溳水闊路繞鳳山微送别無窮恨空慚獨布衣睡覺山中林棲無外事心似野僧間萬籟千峯起空簾午夢還松香飄蕙帳苔色映柴關獨鶴歸來晚遙鐘若箇山挽僧雙樹經行處空懷結淨因松聲禪榻夜苔色影堂春如意間孤月袈裟積暗塵空門了生滅塵世獨沾巾夜泊楓橋懷所知落日閶門外楓橋暫泊舟寒山初上月吳苑欲含秋别夢千重遠殘鐘半夜愁天眀望鄉樹迢遞憶同遊送袖子西遊遊方參佛祖一錫别東林世路蛾眉外人烟劒閣深風霜移戒臘水月印禪心早晚離言說還山思梵音暮秋登冶城平遠臺山壓無諸野臺芳半夕暉連天孤樹遠滄海片鴻飛紺苑皆黃落琳宫盡翠微回看南陌上四牡正騑騑海江送林中州歸不羡魚羮飯寧甘苜蓿香小齊鄰蟹舍曲兒近蛟房别路分沙堰行衣受海霜到家看舊竹凉月滿橫塘送人還建上建水千峯外春城送獨歸雨花飄别酒津栁拂行衣劒浦孤帆逺閩天一雁飛到家應幾日書信莫令稀宫燕杳杳别烏衣還尋禁苑飛結巢依繡户識主近羅幃影落宫潮小聲沈御栁微長門春寂寂猶憶海西歸春日登龍華觀籌嵒青翠裏琳館是仙家徑轉龍峯逼林深鳥道斜白雲隨杖舄金磬出烟霞幽覺塵心遠蒼藤落數花贈别陳孝廉赴京師斗酒粵城闉千門栁色新孤帆辭海月匹馬入京塵鳳闕趨朝早龍池聽漏頻青雲從此去應念布衣貧上已邑中值雨瀟瀟江上雨孤館獨留人山水愁中趣鶯花客裏身縣樓寒樹合僧舍曙烟新遙憶蘭亭㑹凄凉幾度春山人以春茗見寄賦以答之仙嶠多靈草紛披榖雨前色疑䝉頂霧香訝武夷泉林屋人稀到山㕑手自煎愧無瓊玖報徒此寄雲箋題山水雪景雙毫間染處隱見雪花飛萬壑飄瓊樹千峯掩翠微灞橋吟影度剡曲棹舟歸因憶陽春調而今和者稀送張道士歸山用唐人韵烟霞寧久别歸去禮元君養道看黃老將身寄白雲人依松作伴身遠鶴同羣回首千峯暮瑶歌鳥外聞送邑長史白面魯諸生寧知替畫榮一經諳治體百里見民情入幕郎官喜揮毫案牘清一貧今似水處處見香名送僧住崇聖寺青山崇聖寺方丈久荒苔愛爾禪枝秀如今法宇開明心超上乘真㫖悟西來振錫從茲去雲邉施食臺題道人幽居學道居人境林扉晝亦關燒丹傳妙訣采藥問名山醮罷三花落經殘一鶴還黃精新釀熟常有好容顔伸䝉岩讀書我愛伸䝉隱攜琴入翠微身間隨鶴遠心靜見人稀散帙時聞磬懸燈獨掩扉淵源那可測探賾日忘機贈林濟之江田送舅氏赴京選宅相今誰是名家復見君同心看白水送别上青雲海樹烟邉合江田鳥外分阜陽歌酒夜相對思紛紛題王晏碧梧山房梧寺隱山房憐君若鳳凰一簾秋影靜半榻夜聲凉葉露沾書帖烟花拂酒香行當中琴瑟清廟有輝光塞下萬馬防秋急三邉殺氣昏鳴笳雙雁落伐鼓夜兵屯月照黃沙磧風乾白草原空持三尺劒白首未承恩夜宿石門聞秋風洞口微鍾夕隂林散夜聲孤燈殘月下千嶂斷猿鳴颯沓驚禪定蕭條動客情卷幃清不寐松際月斜眀文石江村獨樹斷猿頭天空水自流人家分島嶼魚艇半滄洲海色將帆莫潮聲入户秋為憐魚蟹美長醉酒家樓與同輩遊霍童山白鶴今何在千秋共鶴林人烟山縣小魚鳥洞天深苔色迷仙跡泉聲淨客心無因問丹訣天路杳難尋送滄洲出邑偶賦白髮卧滄洲翻然憶舊遊醉尋陶令酒吟倚謝公樓砧杵千門夕梨棠一縣秋去逢髙慢士應是久淹留草澤狂歌卷三
