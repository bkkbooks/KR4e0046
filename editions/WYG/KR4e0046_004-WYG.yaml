body:
  text: 草澤狂歌巻四明王恭撰七言律詩送林大歸嵗晏山空落葉深臨岐那忍重分衿扁舟不載同歸夢片月空懸遠别心去住誰為悲客路東西總是失家林為予歸去逢知已但道平安是好音用韵答林大正爾交情似海深不堪離别涙沾衿㡬回見雁思鄉信千里移家共客心新酒黄花連夜榻秋風寒夜響楓林天涯共住同蕭索莫惜逢人寄遠音邢逸人寒夜見過每憶家林結弟兄别來空感故鄉情天涯白首重相見客裏殘觴且共傾積雪寒江楓盡落斷􅆐孤嶂月偏眀十年滄海多離别豈必今宵淚滿纓答梅江陳以方先生清隠謝浮名數畝山田也自耕家近鄰洲饒蠏舎客留鄉館有魚羮寒山對酒同誰賞野寺尋鐘慣獨行遥枉新詩問流俗相思一夜斷猿聲秋日留别劉大十年分手隔山川乍見那堪又别筵白髪醉看青鏡裏黄花飄近羽觴前雙湖積水啼孤雁獨樹髙原咽亂蟬何事最闗離恨切月眀重語舊箏絃二年少與君輕别離肯將清淚洒臨岐那堪短褐飄蓬後不似寒牕剪韭時遥夜客心懸絡緯隔簾霜影動辛夷十年此㑹仍分手何得雜尊復共持别劉山人十年身世尚間闗客裏逢花好是閑連雁晚來何處下孤舟江上㡬時還寒雲野寺愁中雨疊嶂青􅆐夢裏山流浪未成歸隠計對君空有淚潺湲梅花城觀兵宛馬蕭蕭鳴北風時平閑却射雕弓千家山郭潮聲裏㡬曲營門栁影中道滿旌麾嚴虎帳廟喧簫鼓祀龍宫玉門定遠遥堪羡白首爲儒感慨同梅城夜泊澤國秋風旅雁飛海天愁思正依依孤城背嶺閑吹笛白露横江又濕衣砧杵遠村寒事早市橋殘火夜漁歸興來且醉梅江月遮莫鄉原落夢微梅江旅夕澄江如練繞楓林仙嶠横江帶夕隂秋滿山城飛一雁門臨潮水抵千金白雲㡬處懐親夢黄葉他鄉在客心無那愁腸偏愛酒戍樓寒鼓又霜砧中秋對月風笛樓前萬葉乾碧天如水浩漫漫鴻聲遠度黄姑小兎影斜臨玉鏡寒塞北將軍空倚恨湘南遊子莫凭欄異鄉今夜堪惆悵何處明年更獨看客中歌越調遥村燈火絶人行一曲凄凉對月眀山葉下時孤雁冷鄰雞啼斷百蟲鳴黄沙磧裏霜天夢白草邊頭日暮情欲變商音誰感激滿天凉雨送餘聲經馮氏先塋音容别後遠悠悠寥落他鄉土一坏野水寒禽空對客夕陽紅樹更闗愁手披荒草孤墳在淚洒殘梅一笛秋淮海十年多少恨㡬人歸𦵏故山頭行次海上晚風吹酒動離顏别路蕭條草樹間積水亂流疑夢渚一峯中斷似君山鷄鳴海曙寒潮小雁引秋聲落葉閑行李飄飄又何往暮雲飛鳥也知還别林十一恭并馮生二女兒逢君江上草萋萋乆客將歸路欲迷日暮孤舟空蕩漾天涯斗酒又分攜青楓孤嶼潮聲小積雨芳洲蔗葉齊親愛重逢更何日野雲流水隔東西行次淮安甘蔗因悼同門友被譴沒于京傷心不見舊同遊離思蕭蕭醉未休暮雨門臨青蔗圃夕陽潮到白沙洲㡬家烟火遺民在千里江陵去國愁莫怪行人倍惆悵羊曇何事泣西州寄清江隱人平遠臺中醉盍簮粤王臺上惜分襟單車映月經槐里孤棹移家入桂林滄海到来無舊業白雲歸後更何心豪華近付東流水誰笑閑門碧草深秋半山中南北雲來孤嶼青島花苔葉露先零天涯月出人隨影夜半幽林犬吠螢僧榻焚香留偈别軍城吹笛帶愁聽遥憐舊好佳期在應買黄壚醉未醒宿陳八家樓世上悠悠多棄貧惟君髙誼始相親昇沈獨恨長沙别南北誰憐失路人吹笛闗山明月上到樓鐘鼓夢家頻江湖風浪連城起何處飄飄托此身西林感舊十年重過謝公樓千里離心感舊遊江上行人孤笛晚路傍離黍㡬家秋浮雲世事如春夢流水年光易白頭别後芳原那可問寒􅆐野鳥自堪愁懐劉君弟從京口軍别離江上語依依黄葉原頭雪漸飛孤劒獨隨邉將遠封書遥寄塞鴻歸蘭陵夜靜休聞笛北固天寒正搗衣何處看雲倍惆悵野􅆐湖水舊山扉書懐簡劉大客庭風雨似秋天轉憶浮生事渺然病髮到來同落葉故園歸去是何年凄凉塵夢遥鐘外迢遞鄉心夕鳥邉萍水不堪流浪遠此行偏動故人憐二海上殘春積雨香旅懐誰爲落花傷未須對酒驚蓬鬢且喜移家近草堂匹馬寒原香漸遠百蟲孤館夜偏長太常峯頂閑宵月盡付離人照斷腸書林二宅洋江春曉圖東風閒颺薜蘿衣水國蒼茫共掩扉砧杵曉聲寒外盡闗河春色鳥邉歸叢蘭露下湘魂遠深樹雲來楚望微惟羡長吟北牕裏風流寧減謝𤣥暉别朱大木香花發是清眀杜宇聲來減客情遠道春深那忍别一樽江上且同傾青塘白馬門空掩積雨寒山暮獨行相識非君相慰藉亂離心事有誰平挽林隱逸家住雙旌乆不回一瓢江上獨傾懐篝燈坐聽風林雨繐帳閒荒藥徑苔西州别後羊曇泣楚澤春深宋玉哀我欲持觴酹芳草夕陽何處是泉臺送友人流西源鳳林闗路遠悠悠惆悵行人過陜州渭水寒流秦塞晚灞亭殘雨漢原秋玉門壁壘行應遍白葦黄榆夢亦愁江海同人今已盡南冠何事到君頭白雲菴白雲深處舊岩扉苔蘚蒼蒼一徑微翠壁紅泉分鳥道石林精舍掛僧衣三峯月出聞猿斷五粒松香見鶴飛今日置身千仞表了然心地發清機贈劉友仲蔚門深遠市塵隠居何用嘆清貧薄田嵗嵗聊供祀先壠青青只近隣夜織燈前催婦早曉書簾下課兒頻林泉茲事仍堪樂猶勝支離笑此身題墨梅烟月景林下花香雪更繁蕭條苔徑共誰看空香半入閑僧定霜影全侵夢鶴閒任逐隣歌江上發恐隨邉笛月中殘故人天外遥相憶欲寄南枝愧獨難題歐陽明府江山草堂巻闕源山下草堂開竹杖黄冠日往迴雨帶新潮低捲幔雲連孤島落銜盃閑棋每憶林間榻靜釣猶思石上苔嘉政只今人共説未應陶令賦歸來送劉監生還京官船一棹大江流才子還京賦遠遊㠶帶夕蕪依御苑夢隨凉月到家樓長淮雁影催寒曙近郭砧聲報晚秋此度金門應早達莫令鄉舍乆淹留寄劉三知已客居風景似湖南長羡山中酒共酣歸夢㡬回梧葉雨懐人多在菊花潭空林野雪閑相待魏闕青雲遠自慚聞説茂陵仍卧病獨將心事問誰堪文筆山房為延平郡造士朱員賦文筆山深隔翠微清暉迢遞映書闈門臨絶澗逢人少簾捲孤峯見雁飛四壁泉聲喧午夢半簾藤影落秋衣潭津自昔多才俊詞翰如君世所稀書番陽戴氏侍萱堂巻樂平才子舊知名曾是清朝被寵榮萱草别来應有夢白雲頻望不勝情闗河迢遞娛親舍銅綬淹留近海城他日錦衣回首去故園鄱水有餘清題岳陽樓壁凌空飛構欎嗟峩無那湘山逞樹柯雲夢曉烟隨鳥沒洞庭秋色巻簾多靈妃鼓瑟聲猶遠仙侣題詩墨未磨更借桓伊三弄笛倚闌聽斷暮鐘和山水圖城隅山水共清暉城下居人半掩扉遠樹微鐘隨去棹夕嵐殘雨到行衣潮來絶島天邉小日落孤雲鳥外歸為問滄浪垂釣者白頭何事未忘機奉答陳滄州朝來空館思依依回首闗河一葉飛滄海斷鴻看又到故山明月㡬時歸蕭條短髮臨青鏡颯沓秋風度客衣唯有滄州知已在未應尊酒頓相違春初憶故人楊栁初青雁北歸海天愁思共依㣲青山悵别頻勞夢野館逢人欲换衣花外看雲孤興遠溪邉對酒故人稀相思更有前期在未必同心與願違齋居喜故人陳希召見過仍别去勞君軒珮問荆扉客裏相逢思轉迷芳草斷雲驚别乆青山明月舊遊非瀛洲迢遞愁中望海樹蒼茫鳥外微别後思君何處是荒原殘日草依依竹下酌遠攜壺榼上幽林竹裏行㕑共盍簮龍影亂浮瑶席潤鳳毛低拂玉盃深潭心氣爽人難醉谷口風微鳥自吟更約抱琴重載酒風流何啻到山隂江城夕眺荒城百雉欎嵳峩城下風來湧漫波雲靜遥天飛鳥迥潮平孤嶼夕陽多風㠶㸃㸃迷烟樹山磬迢迢度薜蘿十二危闌都倚徧闗心無那月眀何夏日過周六園林因有茶𤓰之㑹鳳崗峯下舊荆扉龍眼隂隂暑氣微海上雲山迢遞見林間車馬往来稀風揺竹露沾紗帽鳥蹴藤花墮客衣不爲茶能留永日主人談笑却忘歸三山送客歸錢塘無諸城外樹依依乳酒山瓶送獨歸吳岳蒼茫天外出浙河迢逓鳥邉微離心漠漠隨流水征馬蕭蕭向落暉歸到故園明月夜候門童子笑牽衣夏日過琳宫瓊館迢迢隱碧岑平時鐘磬出空林苔因暑氣侵仙帙鶴伴閑雲對客簮小洞石泉香洗藥古壇松樹净横琴欲談火棗交梨事愧殺紅塵一片心過爐峯寺緇錫京行廊廡蕭然徘徊而還西風缾缽去依依寂寞空門客至稀花徑路苔行鳥跡竹林空翠濕人衣翻經榻下餘殘葉施食臺中半夕暉惆悵松枝猶未偃却令𤣥度獨行歸送邑造士貢京師朝逢遊子拂征鞍花嶼江城解珮環供帳早鶯啼越岸驛程春樹繞淮山金門燭影趨朝入璧水書生聽漏還此後橋門應見月相思人在五雲間春過岩泉寺遠公瀟洒在東林竹裏閑扉隠翠岑祗樹春來忘色相曇花空裏見禪心白雲半嶺迷香界孤磬中峯出梵音此地從來堪習隠浮生㡬度得相尋路傍栁裊裊官亭黄栁枝乳鶯啼斷緑楊絲影留年少看花騎色借隣姬賣酒旗閨裏豈堪牕外見天涯誰忍笛中吹托根不合臨長道空與行人贈别離題故人山房壁薜蘿深隠似仙家半畝荒園祗種茶澗口香泥行鳥跡簾前春雨落松花遥鐘漠漠青林晚遠瀑淙淙白日斜拂壁為君書此去明朝相憶隔烟霞擬題黄鶴樓黄鶴山前黄鶴樓樓前江水古今流英雄寂寞餘芳草鸚鵡凄凉但遠洲漢口月眀鴻影度武昌雲斷笛聲秋行人更莫頻登覽銅輦時逢帝子遊送隣子為僧朝捐初服製袈裟暮掃塵蹤便出家鉢洗維摩溪上月心依支遁寺前霞林端引水時澆棗雨後燒山學種茶待得蒲團成爛草少林枯樹也開花送人使琉球扶桑無路但行舟才子今持漢節遊自是皇威均雨露故將冠冕化琉球風波浩蕩蠻天曉島嶼空濛瘴海秋早晚星槎歸上國殊方休起見京樓擬唐劉文房青谿口送人歸岳州青谿栁色動離愁江水蒼茫送客舟兩岸斷烟看躑躅半天微雨聽鉤輈洞庭月傍君山曉湘浦雲兼夢澤流歸去故園如憶别秋風應倚岳陽樓送人之温陵牧温陵出守君恩重五馬頻嘶悵别難斗酒不堪留客醉一麾今去共誰讙刺桐見月横琴坐金粟行春露冕看但使甘棠公訟簡香名應是到朝端次塘行人擢浙江憲副一經曾采泮池芳况是天朝被寵光宫栁遠隨驄馬色苑花遥惜繡衣香雲開浙水騰秋隼天入荆蠻涌曉霜莫向錢塘追故事六和髙塔野烟凉遊鼓山天風海濤亭髙亭上與翠微連漠漠風濤際海天吳越百城飛鳥外琉球孤島斷雲邉靈源洞古人稀到青草池空鳳杳然深愧遠公相問姓自非𤣥度亦逃禪夏初登西石蘭若懐洽公蘭若春歸雨霽天凌空臺上獨聞蟬岩扉碧蘚凝僧榻林逕孤雲宿梵筵祗樹隂隂啼野鳥斷鐘杳杳出人烟洽公住處今陳迹日暮懸燈益惘然擬唐王摩詰積雨輞川莊上石林迢逓輞川斜積雨烟空見棗花翠壁紅泉分鳥道白雲芳草半人家木蘭柴口朝行藥白石灘邉暮浣紗纓冕向來真外事欲從林叟問燒畬仲夏過靈瑞招提夜半青山有梵音曉攜清興問珠林烟霞路轉禪扉靜薜茘花香野殿深舊入影堂空嘆逝新来釋子未知心應憐法社荒凉久祗苑何因復布金寄鄭助教兼似胄監諸友斗酒東城送别時馬前楊栁緑烟絲橋門到日聞鶯早鄉信逢秋寄雁遲璧水獨尋麟鳳去故人誰與薜蘿期為言六館諸才俊好向春風折桂枝晚晴登沙阜望海嶼偶賦夕蕪殘雨半沙丘沙口行吟獨布裘㡬處人烟分水國數村魚鳥盡楓洲雲歸島嶼千峯白風逓江潮五月秋榮辱升沈君莫問滄溟東逝更悠悠借龍華琳宫避暑避暑林扉興不窮仙家遥借翠微峯雲間鷄犬稀人跡石上莓苔見鶴蹤氷簟更尋花處月角巾閑掛鳥邉松自從心境清凉後却笑塵中萬事慵送人遊武夷閩州山水獨清暉九曲仙源世所稀劒浦夜天烟外小幔亭溪樹鳥邉微胡僧共飯驪珠缽羽士相逢薜茘衣玉女峰南孤磬裡知君今去欲忘歸送陳延用任潮州郡幕潮陽賛畫新恩重斗酒臨岐且共懽落日亭亭將别櫂垂楊裊裊拂征鞍蛇山斷草巒烟積鰐渚滄波瘴雨殘案牘清時貧似水香名應是到朝端送陳二林糧長運軍儲之海城搜粟當年曾作尉富民何事亦封侯却令大姓専輸餉誰信軍儲借上籌千里㠶檣秔稻白百城烟水鼓鼙秋仍聞部曲多窮卒此日遥分主將憂擬唐竇遺夏夜宿表兄宅話舊茉莉花香暑露清芰荷髙館月微明傷心欲話他年舊握手空驚此日情青鏡流年頭共白緑樽深夜酒同傾預愁别路楓洲外千樹蟬聲送客行聞士仁兄擢廣東邑令佐縣吳江獨冶繁曳裙無復在王門風霜不改平生節雨露還沾此日恩馬首未應趨嶺徼鵲聲先爾到家園白沙堤上如休騎須與連枝倒玉樽秋日旅懐西風殘葉帶荒溝旅館誰堪宋玉愁岐路自傷孤客暮雲山空見斷鴻秋家林舊業餘青草萍梗生涯任白頭㡬度扁舟吹笛夜令人歸夢滿東流粤城懐古無諸建國古蠻州城下長江水漫流野燒荒陵啼鳥外青山遺廟暮雲頭西風木葉空湟曙落日人烟古壘秋借問屠龍舊蹤跡斷磯寒草不勝愁題處士山房數畝閑園一布衣薜蘿深處市聲稀酒醒别墅寒猿嘯客散空林夜葉飛翠壁紅泉分藥徑清池白石映柴扉長安道上多車馬何事丘園便息機中秋宴集分韵得清字廣寒宫殿凉如水坐對清暉欲二更但使玉樽頻注酒莫令銀甲少彈筝窓含野燒明還滅簾捲星河淺復清塵襪不禁風露冷恍然身世在蓬瀛暮歸沙堤十里黄沙海上頭數株榕葉半滄洲西風禾黍平侵户落日雲山遠帶樓雁影蕭蕭孤笛暮砧聲杳杳㡬家秋候門稚子牽衣笑不省㣲霜著敝裘送王董教歸沔陽祖道黄花白露寒江亭澆酒悵離顏脊令共向沙頭别鴻雁分飛雨外還夢渚雲開三峽水漢陽㠶帶五華山泮林此後應相憶莫道王音滯楚闗灞陵衰栁昨夜微霜落灞橋數行官栁正蕭蕭聽鶯坐處空殘葉繫馬門前有舊條色借青娥雙晚黛聲隨急吹度寒蜩秦山送别那堪折應把離情寄玉簫擬盧允言晚次鄂州日夕卸㠶黄鶴浦三湘夜色帶霜天風鳴岸葉潮初落月到船忩客未眠隣笛凄凉臨野水驛樓迢逓隠江烟年年蹤跡猶萍梗腸斷孤雲若箇邉送人致政還吳中朝辭印綬髮如霜匹馬東還路渺茫獨樹斷雲吳苑暮孤城殘雨海天凉秋風祖帳人難别黄菊家林酒正香早晚薜蘿花下醉白雲飛近遂初堂春日遊山寺東林雨後樹蒼蒼巾舄乗閑到上方雙澗鳥鳴延語笑半林花氣襲衣裳機閑寳地禪俱寂心寄空門累亦忘自愧此身人代裏何因棲遁遠公房賦得牡丹因感舊遊同軰洛陽城裏卸吟鞍㡬度侯門㸔牡丹色借阿環嬌上馬香分弄玉醉乗鸞銅駝月色人何在金谷春歸夢又殘惆悵舊遊今寂寞一枝濃艷共誰看送僧遊天台雁蕩天台東路遥赤城霞色帶層標青山乞食林中晚滄海浮盃夜半潮下界人烟分島嶼上方鐘梵出雲霄塵蹤自愧迷津乆願得從師度石橋夏初登烏石蘭若懐洽公宿雲臺下舊叢林憶昨從師聽梵音燈影夜窺猿鳥近茶烟風颺薜蘿深蕭條香界栖禪處寥落空門嘆逝心欲問影堂何處是桄榔孤樹一蟬吟贈老醫賣藥囊中况有錢長桑親訣舊曾傳心知肘後岐黄秘老向人間草木年杏滿香林澄夕露桔垂秋井漾寒泉祗今黄髪青山裏無那看雲日醉眠與道人期不至獨鶴孤雲無姤氛漫期飛斾到人群林間半榻虛晴翠天外三花又夕曛塵世㡬回逢甲子青山何處訪茅君想因醉倒麻姑酒辜負名香手自焚擬唐姚合贈王尊師羽客吹笙何處去黄花古路薜蘿間寥寥鷄犬雲中室渺渺烟霞海上山白鶴夜歸經欲盡黄粱秋熟夢初還塵生未免縁浮累㡬度逢師每厚顔僧房燕别故人還山中苔蘚蒼蒼野殿凉别離遥借賛公房雲間馴鴿窺瑶席谷裏曇花泛羽觴對酒不將萍梗恨還山應製薜蘿香江湖秋水多魚雁思爾封緘寄草堂舟次水驛寄闗外同志㠶落秋風酒半醺驛樓津樹大溪濆夕陽鴻雁舟中見眀月梅花笛裏聞獨客秪今猶浪迹故人何處更離群盍簮尚有清宵夢只隔閩闗一片雲夢遊天台赤城霞氣映秋山萬仞丹梯夢裏攀滄海猿啼風葉冷石僑僧去暮雲閑泉飛紺苑三花夕天近瑶京一鶴還何處微鐘霜外斷覺來眀月舊鄉闗送人赴衡州府推官清獻曾聞尚節推料君應與故人期且傾緑酒留簮珮莫對黄花促路岐衡岳雨晴飛鳥外瀟湘雲巻下簾時懸知官下多鄉思回雁峰前好寄詩金陵客夜官槐夾道暮鴉鳴匹馬那堪客帝京紅燭夜忩千里夢青山明月異鄉情白門寺裏霜鐘斷金水橋頭曉漏清陌上相逢空借問㡬人争識馬周名擬唐張文昌送汀州元使君出臨汀守承恩重馹路遥遥㡬日程五馬不辭為郡遠一麾應是到官清鄞江地古銅鹽富閩徼天寒瘴癘輕但使政平公事少木樨花下日閑行霜後燕别小堂紅燭吐烟清鐘漏微微出縣城賞地不堪人又别離筵莫厭酒頻傾星河巻慢浮霜影砧杵誰家起夜聲眀發空江分手去片㠶天外掛離情奉寄鄭助教海國霜寒斷雁飛五門何處整朝衣鳳臺月色空中白長樂鐘聲馬上微中嵗一官仍獨冷西膠三禮似應稀杜陵别後襟期少誰共樽中醉落暉春暮山家花落閑園杜宇飛半溪流水映柴扉茅簷寂寂雲來暝苔徑蒼蒼客到稀洞口青猿啼近榻林間馴鹿息塵機長安年少多纓冕不似山中薜茘衣孟夏山居卜居曾費買山錢林下蕭條屋數椽絶澗垂蘿時見瀑緑槐殘雨晝聞蟬潭邉鹿過疑盤谷嶺口人看似輞川自是幽栖無外事閉門閑看養生篇送人入楚斗酒官亭醉未休春江解纜倍離憂閩闗夜月舟中别夢澤滄波馬上遊漠漠暮雲夔子國瀟瀟黄鶴漢陽樓此行若聽王門漏莫作蘭臺宋玉愁送邑造士貢京師栁嚲花嬌鶯復飛臨岐盃酒思依依沙頭解纜辭親舍馬上看山入帝畿禁邸曙鐘驚别夢橋門新水映行衣遥知闕下承恩重六館才名似爾稀訪僧不值萬松隂裏隠禪扉一上中峰入翠微澗口緑蘿侵岸幘林端祗樹拂行衣春城乞食何人到滄海浮盃更未歸此度尋僧應不遇泉聲山影思依依送人遊温陵送君南去栁條新匹馬蕭蕭滿路塵天近温陵常見日潮歸滄海遠無津刺桐葉暗千門曙紫莢花開四座春聞説此鄉多寳貝昔時全盛只今貧客舎清明杜宇啼來欲暮春忽逢寒食倍沾巾萍蹤每恨天涯别華髪空看鏡裏新故壠松楸應漸遠異鄉風景有誰親經過㡬處堪惆悵渾是山陽笛裏人上已遊龍峰精舍香臺迢逓隠中峰巾舄行尋避世蹤勝槩獨將孤鳥狎幽期還與野僧逢薜蘿洞口雲沾袖躑躅溪邉雨翳鐘回首下方塵土近落花芳草思重重題沙堤陳氏園林佳君住處盡園林橘刺蘿梢維隠心雨過沙山侵座冷春來池水映階深衣沾菜色霜前屐簾捲花香月下琴自喜應無銅墨繫時時來往得幽尋暮春遊冶城鳥石山子規啼斷欲春歸鳥石蒼茫入翠微鳥道隂隂人語絶禪房寂寂磬聲稀桄榔葉覆經冬雪躑躅花殘未夕暉回首驛程西上路明朝離别漫沾衣夏初籌巖籌峰迢逓出髙林苔徑蒼蒼洞穴隂獨樹斷雲孤鳥下亂山殘日一蟬吟雙溪鹿過泉應碧丈室僧歸月又深㡬度欲攜招隠興緑蘿花處息塵心孟夏山中回溪風泛落花深啼鵙聲中見緑隂半壁白雲浮几席一簾晴翠襲衣簮幽棲也作懐人夢髙卧猶懸戀闕心自笑淵眀偏愛酒山林寥落久無金送人遊鼓山靈源洞口白雲飛君去凭髙入翠微閩越故城闗外小琉球孤嶼鳥邉微天花寂寂逢僧宇林吹飄飄颺客衣若對鳳凰池上月頓令心地亦忘機寄鄭助教兼似胄監諸友奉詔西遊匹馬遲金陵山水帝王畿鄉書見雁休愁寄官舍聞鶯曉夢歸白首橋頭聽夜漏青雲池館醉春衣遥憐璧水多麟鳳天子臨雍世所稀送同志往寺讀書一燈寒夜掩空門萬巻經書自討論身寄河沙離獨劫心遊洙泗得真源天花細逐芸香落法雨㣲滋帶草寒知爾逍遥鐘梵裏學成休負遠天恩天王寺避暑溪口長藤半落花紺園開士具袈裟林端香度禪扉净谷裏雲歸鳥道斜氷簟臨風開白榻玉盤貯水割甘𤓰坐來心境微凉夕更喜山童解煮茶贈丘道士還龍虎山吹徹瑶笙一鶴東只含明月噴芙蓉到來滄海樽前雨歸去丹丘鳥外峰月洞夜凉蟾養魄露房秋早鹿生茸仙裾玉珮悠悠去未擬人間㡬日逢秋夜飲殘栁烟空泣露蟬夜堂紅燭照長筵門臨一葉秋聲裏簾巻秋風夕鳥邉且縱芳樽吟緑水莫將青鏡嘆流年興酣耳熱忘頭白不覺清宵刻漏傳秋宴御風臺御風仙珮影沈沈草滿荒臺翳夕隂千里滄波天外合七閩秋色雁邉深寒花委露沾歌席殘葉飄風墮客簮但得玉壺頻有酒此身長健且登臨擬遊洞庭微風孤櫂洞庭遊千里滄波一鏡秋連雁遠鐘雲夢澤斷猿殘笛岳陽樓巴陵雨霽君山出蜀道氷消楚水流欲弔重瞳何處是蒼梧瑶瑟不勝愁月夜有懐同志誰家羌笛暗飛聲越海城頭片月眀隣杵不堪霜下聽塞鴻偏向夜中鳴故人久近滄波遠明鏡愁看白髮生㡬度相思孤枕夢滿庭風月不勝情聞王介軒偕諸公登伸䝉巖作罵巢人去青山在白石巖扉薜茘隂絶澗未霜殘葉爛半林微照斷雲深蕭條香界無僧迹寂歴寒花見客心遥想罷官多樂事風流時有謝公吟送邑造士李良嵗貢之京木落霜寒斷雁鳴六平峰下送君行孤㠶杳杳辭親舍匹馬翩翩入帝京禁邸疎鐘朝珮影橋門孤燭夜書聲遥憐得桂青霄上應愧山中獨隱名遊東觀群山飛翠六平峰琳館依稀第㡬重心遠獨隨雲鶴去機閑應共羽人逢三花影落壇邉樹五粒春飄石上松借問仙源在何處白雲迷却往来蹤春城送客江城春半栁依依客裏相逢又遠違谷口花深迷去騎天涯草緑帶行衣雲開越水千峰出路繞閩闗一雁微想是故園佳麗地候門童子喜君歸將入蜀留别同志蜀道歌來誰共悲明朝還是拂征衣劒門積雪人行少棧石連雲鳥度稀白帝陵邉春樹盡錦官城下夕陽微舊遊謾有相思夢萬水千峰㡬日歸留别方丈友萍蹤無定暫追攀又向烟蘿悵别顔習静豈知離思苦勞生應愧道心閑疎鐘遠火舟中夜獨鶴孤雲夢裏山此後相思何處是寸心遥在翠微間擬唐韓君平送長沙李少府入蜀世路何如蜀道難臨岐誰不悵離顔湘潭騎影寒流外巫峽猿啼夕照間夜火錦城江上驛暮雲劒閣鳥邉山秋來應有相思夢莫惜音書寄往還寄博羅林董教㡬年闕著儒衣兩度持衡坐棘闈嶺海路遥歸夢斷蠻天雁少寄書稀時清豈嘆官如舊道在寧憂祿尚微聞道故人多鶚薦紛紛環珮滿王畿寄寧徳林訓迪憶君時復强登樓雲樹蒼茫悵别愁兩地情多孤夜月十年官冷舊滄洲鶴林山色當盃緑鮫室潮聲到縣秋早晚香名應更達泮池何事乆淹留賦得茘枝送人之燕薊昔年髙品滿長安薊北空聞火劑團閩雨帶花飄别路瘴雲和葉拂征鞍離盃醉擘丹砂顆纎手嬌傳碧玉盤明發幽州千里外竹籠遥寄也應難遊廣陵海門潮落見𤓰州雲樹蒼茫馬上遊千里河山歸禹貢百重烟水入淮流蕪城積夢璚花月隋苑傷心碧草秋二十四橋人静夜爲誰猶倚木蘭舟僧房宴别故人還山中石林秪樹隱層阿却向空門别奈何殘燭夜深泉影盡離筵賔散月眀多還山逸興休魚珮避世閑蹤卧女蘿城郭雲林從此别曉鐘聲裏唱離歌題冶城開元寺城裏青山聞梵音靈源髙閣影沈沈鳥邉祗樹人烟近象外雲花野照深苔色滿廊行履迹月明空界印禪心自憐人代多氛垢未得焚香禮遁林華石上人見過久淪塵俗愧緇衣曾是三生石上違願得遠公留半偈也令𤣥度發清機金沙堤曉香中别祗樹林深定裏歸獨鶴孤雲無住著却令方外故交稀登冶城萬嵗塔絶頂層標出半天千山宫宇翠微連雲飛百粤滄波外鳥度千峰夕照邉平遠臺空秋珮冷毘盧閣静夜燈懸屠龍射鱓今何在蔓草荒陵㡬度烟擬登金陵鳳凰臺髙臺猶有鳳凰名臺下金河繞帝庭淮水漫流千古恨鍾山還帶六朝青風檣積雨丹陽渡酒幔寒花白下亭欲把一盃招李白海天霜雁晚㝠㝠擬遊君山寺獨向巴陵上小舟君山迢逓鏡中浮猿啼古木雲邉迥鳥度靈花象外幽烟磬夜寒雲夢月天香朝泛洞庭秋更隨野衲㸔靈異惆悵皇英墓下遊秋過紫雲洞仙源迢逓紫雲間逸興逢秋偶獨攀遼海鶴歸空夜月瑶臺人去但荒山苔邉積水流天鏡鳥外遥峰㸃翠鬟石竹房中孤磬晚此身那似野僧閑題吳漢津遠遊巻獨銜君命出神州吳楚青山馬上遊千里闗河分禹貢百城烟水入閩秋鏡湖鄉夢浮仙櫂鍾阜歸期憶鳳樓聞道星軺明且别王程猶恐乆淹留送劉炷歸菊潭春深花裏未成歡何事秋深惜别難沙堰醒来楓葉變江潭歸去菊花寒魚風巻幔鳴琴坐蚌月臨牕對酒㸔此後相思應不遠也須雙鯉報平安喜潘元潤至金沙堤上見潘安自愧林居尚鶡冠明月青山應乆别黄花緑酒又同歡空洲日暮孤鴻斷岐路霜飛遠樹寒明到龍江重回首别離渾是夢中㸔題滄洲野堂巻白沙門外水粼粼懶漫還宜漉酒巾華髮任隨風葉冷逺心惟與海鷗馴秋經泉石偏多夢老向丘園有幾人聞道壺觴仍愛客風流能待布衣貧二大堤深樹繞髙原漁榜蒹葭接一作野水晴烟帶逺村江上只留三畆宅人間不記五侯門青林白鳥閑書幌細雨飛花送酒樽􅄼得相逢乘一醉故園山水也忘言草澤狂歌巻四
