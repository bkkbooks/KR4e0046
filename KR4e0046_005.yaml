body:
  text: 草澤狂歌巻五明王恭撰七言絶句二喬圖雙娥嬌掩為誰顰反被榮華誤却身回首東呉何事業野煙寒水更愁人登西石巖不與口占狂客登山逸興新欲同清興愧無因此身得似同林鳥飛去飛来不屬人畫馬圖淮泗雲空苜蓿齊圉人牽出踏青泥金輿不戀西池賞虛負天寒十二蹄種黄精手種黄精只半畦草根時見葉初齊不知門外殘春雨多少飛花踏作泥海市晴雲圖燕薊雲山王氣收行人猶自問登舟秪今海子橋西月獨照灣河水尚流山水扇面茅舎青山少四隣蕭條苔徑絶紅塵相逢試問山中事老向林泉有㡬人二鳥外埀陽覆石磯隔江晴翠晒行衣蒼苔野徑柴門盡相對雲山共息機三夕陽溪上掩荆闗漁浦風村杳靄間莫學林僧解㤀世有錢莫買沃州山春山欲雨圖寂歴青山静賞機野情那似宦情微抱琴欲渡湘江去雲暗蒼梧雨欲飛韓信報金漂母恩沾一飯尚知酬義重綱常豈負劉惆悵淮隂何事業斷煙寒草不勝愁古木山禽圖梁王池苑罷經過古木殘雲奈爾何莫放流音空嫋嫋行人長少夕陽多雪灘鸂鶒北風吹雪渡河闗家近瀟湘夢亦閑猶勝寒環舊時雀孤飛正在紇干山秋水鴛鴦宫瓦凌秋飛早霜繡衾遥夜度餘香自然影落空潭水不管人間更斷腸雙美人吹簫黛娥雙染為誰嬌長信深沉夜品簫一曲梁州相倚恨露花如水上芭蕉宫人春思圖君恩那似栁條輕門外金輿暗度聲獨立長門春又晚一簾閑草上堦生早寒客舎迎寒獨未歸白雲鄉樹逺依依西風黄葉如相識故向山陽笛裏飛送人之薊丘憐君迢遞薊門行匹馬閑嘶問去程瀘水燕山何日到秋風吹雨濕金莖臺城送客之廣陵城金陵樹裏送行舟二十四橋春水流腸斷瓊花天上去更無歌管下揚州憶山中精舎一從巾舄别林扃清梵香臺夢裏經遥想秋来風露冷芭蕉抽葉㡬回青寄越城知已郡樓寒夜響悲笳夢裏還鄉路益賖莫道故人消息近越王潭水即長沙寓意南苑花紅北苑稀美人樓上泣羅衣同時種樹應皆落何事秋風却後飛客中夜雨孤閣懸燈暗復明滿林凉雨落秋聲别来多少湘江水盡向蒼梧葉上傾題墨菊蘭霜落楓林秋氣髙霜黄煙翠積湘臯青林酒醒西風急剩寫離情寄楚騷二湘江閒唱九歌聲栗里應辭五斗榮誰謂風来秋物冷露黄煙翠不闗情經懐安有感岊河江水古今流送盡年光與客愁莫嘆寒門空草色五陵佳氣散成秋水墨蒲萄西塞秋風寒露飛草龍珠帳正依依不知五馬縁何事轉羡凉州一斗微題猿圖西風殘葉響秋江樹抄青猿挂影雙因憶孤舟經峽口數聲隨雨落篷窗題小景山水雲山迢遞樹蒼蒼春水微茫帶野航欲傍漁郎深隱去武陵雖好是他鄉口占寄友青草平湖白鷺飛石門煙樹半晴暉菊潭對酒閑埀愰誰向籌峯共採薇彦魁題梅霜花映水夜含虛畫角聲中片月孤一自羅浮清夢覺又隨香影到西湖明老題梅東閣髙人不見尋孤芳只合老山林知心尚有青天月照見嵗寒氷雪心題茅齋霜月猿斷霜空燭影微半林孤月掩荆扉五陵年少皆纓冕何事寒山獨布衣野航風雨楓樹蕭蕭野水西楚天雲雨正凄凄滄江欲暮風猶急誰泛扁舟更出溪題木芙蓉西風吹袖玉顔酡揺落秋襟奈爾何一自雁池清賞後梁王賔客已無多林彦衡典教因山余以墨竹寄之因題于上好是篔簹玉一枝露寒金薤影離離泮林官冷閑㸔畫知爾家園落夢思白蓮圗為鄱陽戴處警賦素襪凌波緑錦裳參差環珮夜微凉青芬已在瑶池上况是承恩雨露香書雲山小景野杖閑行日未曛商歌休使世人聞生平㝡是知心者秪有青山共白雲胡人牧馬圖海子橋邊卸馬鞍燕山秋草色漫漫百年王氣和煙散徃事空從畫裏㸔暮春雨中作簾前花落杜䳌鳴棕葉蕭蕭半雨聲迢遞故園歸未得天涯芳草揔闗情登鳯凰山仙人梯鶴山吹笙去不還空留梯石白雲間塵凡自愧無仙骨獨對巖扉試一攀道邊松驛畔長松㡬百秋行人到此也生愁最憐毎被官軍斫滿地寒膠作淚流擬逰天台山赤城霞氣映層標華頂遥臨見石橋更到謝公登覽處泉聲山影晚蕭蕭送人歸蜀蜀棧凌雲不見行劍門煙樹最闗情君家正在魚鳬國出盡平川是錦城二劍門西望蜀江流白帝城邊葉未秋歸到山林何事業木棉花發杜鵑愁漁樵清話樵歌日日出林扉贏得身閑坐釣磯莫向相逢笑貧薄人生此樂也應稀摘蘭寂寞深林野水濵可憐開落不逢人知音更有誰堪贈持與湘南放逐臣夏夜舟中碧潭遥夜小孤舟凉月清風揔是秋何事故人千里外江楓漁火共闗愁碧筒歌試折青筒當玉觴緑莖通處瀉瓊漿㡬回醉買西湖月卧載蓮舟夢亦香題秋江待渡扇面孤庭楓樹暮江頭何事匆匆逐去舟莫向瞿塘灘下過兩崖明月斷猿愁山樓晚坐有懐同志緑蘿煙暝夕陽收何處猿啼更倚樓京國故人分别久楚雲湘水共闗愁山莊獨夜草屋殘燈夜轉深竹邊螢火照孤吟青山歴歴猿啼斷儲葉蕭蕭月滿林逺浦歸㠶逺浦歸舟鳥外還棹歌迢遞過前灘丹楓樹裏㠶初落多少青山夕照間秋山暮歸桄榔枝上夕陽微寂歴秋風吹葛衣回首前溪燈火起隂蟲聲裏扣荆扉二白雲迢遞亂峯深谷口斜暉轉樹林歸到茅齋燈火夕不堪黄葉與秋砧秋日逰皇恩寺蓮宇經䑓花正香白雲深映竹邊房清逰惜共林僧别行聽微鐘到學堂春江送客江亭春樹曉蒼蒼樹裏鶯啼也斷腸三疊陽關須盡醉東城門外是他鄉山居即事門掩青峯野水間緑蘿花暝鳥飛還紛紛車馬紅塵裡何似仙家半日閑古鏡匣裡菱花重百金重重磨洗畏塵侵六宫只辨媸妍色不照孤臣一片心送人從軍永寧忍淚含凄别四隣温陵南去栁條新殷勤試問邊城卒年少封侯有㡬人采桑玉腕羅裙陌上桑南枝裊裊北枝長殷勤為謝青雲客莫把黄金買路傍寄山中人佳君住處在深山髙卧林扉日日閑借問松間雙白鶴何時相問到人間暮春田家鵓鳩低傍野田飛布穀聲中半掩扉不願五陵衣馬貴但令州縣往来稀夜投山館野館殘燈暗復明子規聲裡客愁生緑蘿洞口三更月何限鄉山萬里情聽雨中酒空齋醉不眠蕭蕭鳴雨暮春天自憐葉葉芭蕉裏擬是呉山半夜船送人歸覲天涯長望白雲飛此日憐君暫得歸好是鄉園春雨後落花風裏舞斑衣暮春雨中作湘簾巻盡思悠悠目斷遥天雨未收莫道故園無别恨落花流水也闗愁送嶼南林虛白歸情深那忍送君還海嶼南隅雨未乾歸見渭陽如借問為言孫子寄平安梅城曉角玉壺淋盡報殘更嗚咽營門㡬度聲明發不堪回首處梅花零落滿江城二城烏啼斷海東頭三弄梅花起戍樓誰向營門㸔月色聲聲都是别離愁飲酒言懐竹亭花徑小闌干緑酒新詩且共歡浮世相逢須盡醉青雲都向命中㸔雨後登南樓雨過晴樓獨上遲海雲江樹逺含滋繁華盡逐東流水惟有前山似昔時折荼䕷手挽長條刺拂衣淡黄疎白共芳菲五陵年少無拘繫落盡殘香未肯歸贈釋子赴闕逺隨飛錫過閩闗迢遞呉山共楚山遥想禁墀清梵曉泠泠鐘磬五雲間王昭君行辭女伴出深宫玉淚雙埀向白龍㡬度氊廬歌酒夜胡王空惜舊時宫田家夜雨山雨瀟瀟静掩門績燈影裏戱兒孫棕櫚葉上聲聲好不似天涯斷客魂經山中舊宅柴門空掩樹隂隂積雨荒苔路更深自是塵中那久往白雲流水更闗心四月東湖泛舟荇花風裊斷烟微共㸔蘭舟汎夕暉篷下美人歌白苧緑荷深裏白鷗飛貧士百金費盡不羞貧斂足衡門㡬度春昨日東風南陌上㸔花多是五陵人野寺尼情憶閨中悟已深空門纔到更澄心楞伽讀罷禪初定野鳥林猿只共吟送人下第歸桐城青雲失路欲沾巾陌上愁㸔得意人歸去青原山下路野花啼鳥故園春江城夕眺江頭獨樹起孤烟江上雲開雉堞連芳艸萋萋歸鳥没望鄉猶在夕陽邊林塘夏夕有懐同志野樹疎藤覆夕隂半池殘水夏凉深相思㡬度空惆悵林下何時再盍簪釣溪山下清溪月様灣狐衣孤坐一絲閑五陵年少誰家子白馬翩翩自往還池館新秋西風池館早凉歸梧樹蕭蕭一葉飛誰道秋来悲宋玉江南逰子更沾衣田家新釀數畝山田沉一秋釀成寧羡醉鄉侯興来獨共鄰翁酌不問農家識字逰秋日郊行獨扶殘醉出江城原野西風萬葉聲日暮闗河似秋水蕭蕭鴻雁不勝情西園賞菊秋風蕭瑟過重陽黄菊花開酒正香人世相逢須盡醉牛山何必涕沾裳節後黄花節去東籬花漸衰紛紛蜂蝶不須疑蕭條更有餘香在不比梁園二月時暮秋喜友人自京回秋風黄葉雁臨闗客路微霜感别顔莫嘆故園芳草積西湖能有㡬人還秋山行旅寂歴髙秋亂葉飛斷猿聲裏日初微自憐萬里長為客猶向西風著布衣碧筒飲翡翠盤深瀉緑波曲莖微渗藕香多寄言河朔流連飲莫把黄金鑄線羅瘦馬圖曽是瑶池弄影嘶病来無復錦障泥只今毛骨多消減空對寒原百草齊山樓晚坐有懐同志松下樓髙入翠微望中山水有晴暉空林月出溪聲冷何事知心與願違新秋送别故人此别隔關河况復新秋一雁過明日征㠶何處泊斷蟬衰栁夕陽多送僧逰方東林溪上暮雲飛寳地焚香送衲衣行處不須勞借問野花山鳥即禪機聽雨桄榔葉底夜聲寒鄉思無由夢裏㸔明發不堪江上望蒼梧雲盡水漫漫送道士赴闕試經仙逰何必悵離心楚水呉山鶴上吟更想清晨誦經處蓬萊宫殿五雲深題水墨蘆雁秋水黄蘆山月明同来兄弟最多情飛時莫近瀟湘浦二十五絃腸斷聲暮秋送客之塞上臨岐盃酒若為情楓葉蕭蕭獨雁鳴萬里闗河秋色裏憐君何日到邊城寒齋留客山中酒熟蠏初肥寂寞憐君問竹扉莫為家貧便分手出門應是故人稀冶城送人之金陵越王䑓下送離觴回首闗河路渺茫别後相思孤笛夜鳯凰䑓下有微霜冬獵揺落霜天百草空羽林年少灞陵東彎弓射殺平原鹿笑入呉姬酒館中溪行逢霜蕭條客路度微溪昨夜清霜印馬蹄楓葉梅花愁望斷更堪林外野猿啼雨後秋山遥天雨過亂山蒼千樹髙原葉盡黄惟有西風松栢裏白雲深閉野僧房客中見新雁西風初别塞垣秋迢遞分飛楚水頭客裏心驚那忍見故園兄弟更闗愁秋日郊行荒原蕭索葉皆稀海底孤城掛落暉時事滿懐吟不盡西風吹冷薜蘿衣客中見孤雁有感江燕逢秋去漸稀明朝回首是烏衣獨憐滄海人流落猶向西風嘆未歸雨中秋思西風微雨對空堂門栁蕭蕭葉盡黄江海親朋零落盡寂寥燈下傍凄凉九月二日見菊蕋尚青偶賦野杖閑行過短籬葉間青蕋尚開遲年年九日龍山㑹恨殺黄花未滿枝鵓鴿雲齊千里競髙飛風引鈴聲落翠微㡬度月明霜冷夜飄零猶認主人歸木芙蓉小池霜冷藕花空却有寒枝浥露紅莫恨芳容生獨晚好隨黄菊傲西風秋暮喜友人自京還黄花蕭索暮寒催千里憐君此日迴自説月明霜冷夜相思曽倚鳯凰䑓秋窗睡覺西風烏桕葉先零黄菊盃深酒未醒何處砧聲忽驚覺露華明月滿中庭草澤狂歌巻五
