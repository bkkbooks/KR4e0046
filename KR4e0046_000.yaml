body:
  text: 草澤狂歌别集類五明提要臣等謹案草澤狂歌五卷明王恭撰按恭所作三集鳯臺清嘯已不傳故千頃堂書目有其名而闕其卷數范氏天一閣所藏僅存其白雲樵唱而無此集此集出自秀水汪氏蓋幾佚而僅存也大致與白雲樵唱相近而中年所作情思較深靜志居詩話嘗摘舉其集中佳句數聮然如渭水寒流秦塞晚灞陵殘雨漢原秋棕櫚葉上驚新雨砧杵聲中憶故園幾處移家驚落葉一年歸夢在孤舟諸句皆詩家常語至雲歸獨樹天邉小雪罷孤峯鳥外青句則小字形容頗拙罷字節次未明又鳥外明河秋一葉天涯涼月夜千峯句尤為疵纍夫畫見飛鳥不見明河夜見明河不見飛鳥上四字自不相貫一葉落而知秋不係乎明河天河夏月已明不係乎落葉下三字亦不相屬蓋興之所到偶然拈及不足以盡其所長讀恭詩者毋執是以刻舟求劍可矣乾隆四十二年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:ccc886add1d79070853b6f38e837dc5cdca3536f3520df8d9e6498336054f186
