body:
  text: 草澤狂歌卷二明王恭撰七言歌行汲井嘆轆轤懸青絲芙蓉覆金井比君不照心似妾可憐影銅壺墮水風捲花為君中路改榮華人生百年有知己暫時榮落何須嗟題琴合故衣卷嶧陽古桐瓊樹枝吳絲作絃雲錦衣黃家舊物紫陽篆彪炳文章光陸離亂離何事翻相失龍池鳳沼無春色淪落天涯幾百秋豈意人間今復得琴囊雖好人更清相逢脫贈應有情君看昔日延陵對好是悠悠身後名漫歌行君不聞豐山鐘古銅裂缺追蠡蟲霜華滿天激清響夜夜龍鳴西頂中君不見豐城匣中三尺水凛凛神光射眸子蜿蜒已沒秋海空落落寒星氣猶紫烈士英靈亦如此黃金散盡遊下邳四海蕭條人竟欺男兒豈負報國憤此心感激誰能知悲歌擊筑來燕市易水秦原幾千里鼓刀屠肆心可慿慷慨夷門為誰死青袍買酒上林春衣上徒香京洛塵五侯賔從少知己羽林年少輕才人山中布衣取卿相太后穰侯不相讓入門長揖隆準公致身歘在青雲上狐裘柘弓那可期長楸走馬行射麋何須白髮魯中叟轉數黃鬚塞上兒以茲却羡歸來好驅車便發青門道青門栁枝三月春飛絮愁人不肯掃石門山水青如苔與君間來日幾回寧無祿米二千石莫棄黃罏三百杯鷓鴣啼懷林十二謫後鷓鴣啼聲鉤輈空林積雨寒蕭索黃茅嶺上幾人行緑樹村南萬花落鷓鴣啼聲格磔誰使霸陵遊翻成夜郎别惆悵偏傷行路心苦道行人行不得昨憶王門聞曙雞今朝愁聽鷓鴣啼驛樓宫樹曾不悟旅舍郵亭應始知鷓鴣啼草凄凄長淮路去弗迷龍門行留别陳大因悼楊關西楓林野水龍門道海嶼青冥秋浩浩沙頭昏曉落寒潮渡口寒暄自芳草芳草萋萋春復秋來往行人應白頭十年不醉龍門夜此復經過愁更愁緑江沈沈泛輕舸旅舍蕭條獨行坐秋風颯颯吹雁來山葉飄飄向人墮元龍髙樓誰復過子雲舊宅今如何年芳寂寞山花笑往事凄凉野鳥歌此去傷心不能已嘆息人間秪如此詞賦空留千萬言世人見如一杯水淪落天涯一遇君龍門之下又離羣那知别後芳山裏叫月清猿誰忍聞霜天曉角女垣啼烏天已霜玉龍一聲愁斷腸商聲凄凄羽聲切畸士孤臣皆惋傷玊門斥堠連沙漠置酒軍中少歡樂鐵面將軍慘不驕碧眼羌兒淚先落洛水蕭條渭水頭隨風悲壯五陵秋可憐金粟驪山下誰識千秋萬古愁自從棄置江淮久幾處聞之應白首暝色摧殘隴上春風光不度邉城栁今宵縱酒歌别離雪花著人寒不知麗譙别後聞吹角與君同此長相思經甘蔗州贈朱山人北風吹長林林下白日曉黃茅獠洞少人行萬磧千峯絶飛鳥臘盡山中霜正繁長裾短䇿扣君門棕櫚巷裏人烟僻蔗葉籬中雞犬喧君家結搆連雲起樓上青山下溪水溪水東流竟不回野花林路長蒼苔澗中落落青石小谷口曨曨錦樹回知君久負青囊祕前代曾楊共流輩山北山南得葬多白璧黃金買無地巾屨長留懶出山姓名那得滿人間灤河易水不堪聽鍾阜龍盤猶可觀羽林少年行羽林少年任俠子自矜生小豪門裏傾財破産不顧貧剖肝隳膽向知己壚頭少婦邯鄲姬燕歌一曲舞羅衣飛觴勸盡蒲萄緑揮鞭擊碎珊瑚枝黃雲邏逤烟塵暮轉戰千場身不顧性命由來一羽輕得功讓與將軍去歸來下馬洛陽城洛陽年少爭逢迎連營部落避旌節大府官僚如弟兄一朝流落英雄盡獨立春風吹鬢影長歌一劍江上行更問平原家遠近冶城遇集呈陳紳進士因觀故人陳則誠博士書至冠蓋相歡冶城下王壺青系酒如瀉君是南宮第一流豫乃夷門最卑者别來看君毛骨奇美髯大顙仍赤眉丈夫意氣有如此男兒性命那可知結交况復同鄉里年少唯君最知己相看不忍問同袍十人幾箇黃泉裏生别故園長苦辛又愁親老更家貧三年古戍鄉心遠四壁秋風山鬼鄰桐邉校文近有書書中還道意何如乃知别後相思苦未必青雲交態踈西林野老西林野老頭皓白飲淚燈前對孤客昔年曾過君家門君時有子仍有孫奔走星纒不停轂昔嘆人生如轉燭掌中已失月明珠目下誰憐汗血駒少年風光那可想西麓田疇日應往荒園種豆苗不生白首驅牛犁不行日暮凉霜拂髙樹桂花門前隳如雨世事悠悠莫怨嗟得錢還醉黃翁家閨中曲妾家官道廣陵堤甲第朱門隨栁低豈期夫壻重游俠走馬探丸仍鬭雞朝歡田竇青油幕暮醉金張白接䍦去年驅車洛陽北今年結客太行西不逢何處寄西雁空數行人歸馬蹄簾前春色寒凄凄鉤輈飛鳥妾亦啼機中雲錦看成淚門外飛花踏作泥愁時把鏡空自悲消減容華誰得知東鄰少年不相别嫁來原自娼家兒醉歌謡君不見貧士裁衣白苧鮮暫著翻成惜於錦相逢正乏杖頭錢脫買黃壚對君飲胡椒千斛金百斤誰能長醉甕頭春但看越人城南松柏裏古墳蕪沒今墳新送人復雷陽軍十月河水寒北風栁條折行人懷往事恨恨不能别男兒慷慨重橫行魚腸二尺角弓鳴時來看子請纓去玉門何處烟塵生贈桃源陳處士逢君滄海心脫略當世事疏散義熙人風流建安氣文章只掉三寸舌如瓶注水爭淋漓先秦遺收汲冢祕五經發難無留疑桃源瀟灑衡門裏悠悠逸興東流水布襪青鞋白苧衣角巾野服烏皮几去年著書梅隴山今年濯足苔溪灣身隨幽鳥栖復遠心與孤雲間復間有時山水窮登眺緑蘿嫋嫋聞猿嘯林霜澗雨不逢人手掇松枝向誰笑有時中酒髙忩眠飄蕭素髮臨風前胸中况是丘壑美身外能無纓冕牽君不見終南青青幾芳草行人只道長安道昨日青雲相識多五陵衣馬今如何織苧篇鳴機聲裏花如霰白日簾前那忍見嬌容無力十指纎幾日才成一匹練年年輸稅入官家姑老兒雛空嘆嗟夫壻宦遊行不歸妾身長著嫁時衣寄宿田家日暮寄宿在田家谷口南風生棗花田夫歸來繫牛牯向前問客何鄉土厨頭喚婦具黃粱樹裏攜瓶沽酒漿木綿作衾溪石枕青竹為燈照吟影田夫更語妻勿嗔客子不是尋常人歌行重别海上陳文學去年别君歸秋風吹人黃葉飛今年與君别栁條拖地花如雪人生會合能幾時問君結交何太遲得錢相逢且沽酒擊劒何思悲路岐白雲海上連天闊湖山微茫青一髮别思空隨海上波歸心已絆雲邉月君莫愛長安道上金眀枝密葉青青霜後移南山桂樹無凋期歌行贈李隱逸兼張林二學士客行清溪上愛此溪中水時有溪上人心期亦如此溪水東流清復深扁舟幾宿到雲林垂蘿飛鳥引行步野鳥間雲知我心君家住處如盤谷四面青山霽人目五月簾櫳鳥外間千年松桂霜中緑溪南溪北幾人家種田牧豕仍桑麻蓬萊仙洞只藥草武陵流水空桃花曲堂置酒留清曙落雪飛花滿行路黃石山中辟榖時呼猿洞裏看梅處日暮寒風吹轉蓬暫時相見未從容待豫謝却龍池客他日來從兔苑農梅花引為林逸人賦北風吹霜百草折官舍人家梅盡發橫枝放暖天為香亂蕊凝寒雪逾潔今古何人解愛梅繁花空自雪中開愁雲夜掩凌風觀蔓草秋生却月臺風流獨數巢居閣門閉孤山老雙鶴不轉胡姬笛裏生寧隨漢女宫中落君向林間住日長相逢花底未渠央最宜眀月照行斾不憤飛花落酒觴酒邉花下堪留客回首東風拂行跡眀月扁舟歸去來故園亦有凌霜柏海上贈别駕馬英杜陵才人新豐客劒佩相逢舊鄉國縱酒狂歌梧桐秋遠遊夢著邯鄲陌黃金髙臺無復過青雲失路古來多諸侯貴門君不到五陵豪氣今如何只今家貧誰比數黃葉秋風滿忩户半室間棲嶺上雲一瓢獨飲山中樹薄俗紛紛那可言暫時貧賤不須論君看舊日揚雄宅寂寞蒼苔空閉門酬關西故人故人跡疏情尚爾新人面好心猶異當時唯恐結交稀零落相知竟誰是昨日方開北海樽今朝又署翟公門世情反覆徒為爾人生貴賤那可論自從落拓風塵久嵗月蹉跎世看醜羡君閉門但讀書知君得錢即沽酒我亦辭君向白雲山中猿鶴可為羣秋來偏是凌霜柏五粒松脂堪寄君答林逸人兼柬劉大因憶滄洲野堂叟小來攀俠遊脫身過伊闕白馬行看戚里花錦袍醉舞娼樓月娼樓酒幔官道春孟嘗平原能愛賔報仇雪耻感恩遇瀝膽隳肝寧顧身以茲意氣紅塵裏悠悠嵗月東流水交態空輸杜宛兒致身不及南鄰子常何新豐識馬周蔡澤秦川尋應侯西京誰復念王粲間關雨雪來依劉劉君世胄前司馬德業龍陽復瀟灑弱冠追隨今白頭流落看同最親者邇來江漢與君逢章甫衣裳多雅容看君自是龍池客斂跡寧甘兔苑農同心且道相逢晚薄俗紛紛夢猶懶囊中久閉龍唇琴世上終希廣陵散大堤沙水白粼粼為豫歸訪滄洲人江國晚秋澤國秋氣深微霜葛衣薄斜日川上寒孤峯鏡中落渺渺粵人烟依依海山郭鄰笛聲已凄遙砧晚猶作滄波苦竹斷猿哀蔓草黃花與嘯臺前代風流亦如此如何不飲杜陵杯雞公壟荒岡古墓雞壟邉蔓草離離生野烟狐狸養子隱荆棘烏鳶作巢銜紙錢石麟埋沈土花濕雕磚剝落樵人拾天隂燹火暗復眀月下精靈語還泣此墳未必無子孫夙昔傳聞皆宦門浮榮一去不復盛空餘古木啼清猿誰家新塜高數尺又買西家墳頭石憶過秦中北邙路喪車轔轔塜無數黃金買山葬死灰昨日官軍斫墳樹崩塋斷壙碎苔痕髑髏無聲眠草根生前意氣動山嶽身後凄凉邈九原君不見羊公峴首石已刻季子延陵碑尚存錦袍醉倒長安市誰招􅉅石江心魂豈知百年後身世兩俱沒貴賤終同草上塵升沈且進杯中物笑矣乎悲矣乎眼中之人今有無醉歌行留别張潛中夜飲朱顔酡鬱金美酒金叵羅揚眉吐氣為君醉相逢不飲當奈何思君隔長河會少離别多劇歡繼銀燭婉孌出青娥江謳越吹空浩蕩郢中白雪揚清歌春風無情吹桃李昨日花開今結子貴賤悠悠何足論古來萬事東流水邙山之墳半無主馬鬛蓬科動離黍銅雀歌鐘散晚烟茂林松柏凋寒雨酒闌莫唱丁都護空使哀情慨今古青鏡頻看髮漸稀黃金一去交難固少年心事誰共知結交誤結輕薄兒一朝貧賤忍相棄豈惜浮沈應有時樓頭楊栁垂青絲樓上與君傷别離傷别離長相思水流花謝兩相失雨散星離從此時明朝更越千萬山再歌一曲行路難行路難摧心肝放歌行酬林逸人良針拂鬱促刺三十秋過眼光隂如水流黃金白璧果何物世人見我如雲浮蹇衣太行屹巉絶瞿塘逆水無行舟君山洞庭濯雙足石鏡香爐時一遊蒼梧隔雲叫虞舜湘靈無聲風雨愁遙望金陵道葱葱鬱佳氣錦袍白馬競時來翠華閣道連天起又向秦中登太華黃河一髮天邊瀉三峯連綿不可攀中有長生解飛者結交廣成子招邀洪崖翁口含眀月駐精魄身騎白鹿回颷風笑誇蓬萊指絶頂更歷元始窺鴻濛羽人如雲集星宫三十六帝俱雍容帝前玉狗聲唁唁帝旁侍女宫衣紅小臣手擎緑字封拜咨元父隳丹衷願為下土招揚雄揚雄才大人稀識窮巷蒼苔少行迹車馳馬走長安城揚雄與人無世情明當攜手天門歸青霓為裳紫霞衣朝飲天池暮沆瀣下視九土如塵微洗馬潭苔髮毿毿古潭淨奫淪積水流如鏡昔人牧馬今不還蔓草繁花自相映憶昔前朝全盛時驊騮叱撥人爭騎風流一去夢相似陳迹空為人所疑牧叟耕童間來集對此誰能感疇昔磯下從教鹿飲潭沙邉不管牛行迹昨夜風雷繞太清青山倣佛聞龍鳴此中何代無英者會見承平人洗馬送人至溫陵江城五月南風作榕葉初凉棗花落官爐酒貴人不賖客路無錢少歡樂憐君倜儻能遠遊粵王潭頭繫小舟經過不待平原席濩落寧悲季子裘自言家住桐隂下雲榭臺中日瀟灑紫英花開香滿衣檳榔葉大寧論價三十年來何愴哉凄凉人物與蒼苔眀珠象齒不復惜海客番船何處回别來鄉縣還幾旬况得延陵為主人論交自是少知己薄俗誰能無棄貧嗟豫飄轉紅塵裏千載春衣厭泥滓醉後狂歌空有神交態看同一杯水送君遠遊歸故園我亦還山依鹿門相思平遠臺頭月忍聽清原洞口猿出門行留别城中友出門將行復少住牽車卷䇿誰家去五侯池館少逢迎行人不過新豐樹長安西上行路難壚頭酒貴金買官漢庭諸君忌年少長沙遠謫何時還梁園賔客今何在梁園種木聞已大梁園歌舞已浮雲空使行人想風采此意臨岐難重陳相看杯酒淚沾巾紫菱葉大荔枝熟莫愛風光忘却人觀滄洲二藳有作古人名詩凡幾家隂何徐庾皆清發遂使少陵謫仙輩深得黃初建安骨爾來作者雖能鳴此翁吐詞多正聲百年英氣結詞賦每日揮灑娛心情鏡湖流水澄孤月太華蓮峯積飛雪千載黃鍾繡作花三嘆朱絃響疏越滄洲二卷俱可人首首看來如有神始知先輩老風格不逐餘子徒清新角巾野杖間瀟灑緑水清池思堪寫願得眀時入帝京閟宫清廟歌承平題建安朱氏杏林雲隱圖君不見廬山岑董仙在時花滿林身騎白鹿忽飛去江海寥寥千古心君今種杏知何所解向青山作茅苧雲中澆酒祀岐黃林下還丹結龍虎羡君有道不羞貧賣藥無錢常與人抱琴出谷迷行屐散帙臨流醉角巾武陽山水多奇處金鼇蒼蒼但烟樹雞犬長鳴石上苔漁樵未識松邉路自是先賢六代孫布衣不到五侯門相逢又欲還山去他日思君愁斷猿酬陳大見寄北風海上來落日草根白長嘯登髙丘遠望無諸國劒水東流霸氣寒臺江千樹葉聲乾英雄去後遺弓劒蔓草芳陵那忍看我家正在平臺北十載迷魂歸不得幾度逢人問故林碧池細栁今蕭索少年任俠無所憂奮身欲向銅龍樓長安春物忽相棄終南灞水空悠悠青雲迢遞誰將引况乃摧殘更多病緑髮從教變雪霜丹心未必隨灰燼陳君倜儻無世情讀書千卷尚逃名一門兄弟俱才俊百嵗嚴君更老成感君意氣空流俗貧賤相看情轉熟客舍迎霜已贈衣山儲纍月常分粟風雨凄凄四月天孤村芳館度流年未投定逺傭書筆羞逐君平賣卜錢答馬造士鐸請君膝上弦泠泠拂商羽古調凄凉那可聞世情反覆寧堪數擊劒狂歌浪自驚平生肝膽向誰傾梁王宫闕隨草蔓緑池野樹空蟬鳴五陵豪貴能相棄知己悠悠竟誰是客舍鄉書醉懶題蒼苔落葉門還閉以茲感激無所求閒卧茅齊四壁秋西風笛裏山陽淚半夜燈前季子裘愛君長才世希有鄉縣黌宫坐未久踏槐折桂應早期白日青雲兩無負雁峯積翠髙連延喬木蒼蒼幾百年君家正在雁峯下此樹正對湖山前知君愛客情偏重春酒槽頭百餘甕積雨閒宵醉共眠空林達曙驚殘夢夢時曾向故園歸歸見鄉鄰故舊稀傷心一二同袍友問我飄零只布衣貧居斂跡甘自守豈料天涯與君厚幾日相思不見君令人獨坐空搔首奉寄鄭浮丘先輩兼簡龍門漫士隂寒變微暄澤國東風後嚶嚶黃鳥語裊裊青絲栁滄洲二月花正開滄洲堂上置酒杯登堂忽見浮丘面借門行人何處來去年走馬朝京闕臘月都門正飛雪客舍偏驚白下春歸心不醉秦淮月聞君昔時能遠遊飄如黃鵠橫九州掉頭不肻縛塵綬長嘯曾乘踏海舟風流况是才名久健筆雄詞世希有生事何須負郭田丈章只在今人口擊筑邀歡喜盍簮青山落日孤猿吟三更酒醒人散後惟見月白平湖深此時與君情轉熟客裏相看不能别問我摧殘向幾秋離心未忍從頭說相隨相送雁峯頭雲散青天碧海流送君别來未幾日落花春暮令人愁人生萬事傷懷抱那似凄凉不堪道舊友凋零半九泉故園索寞空秋草龍門髙士更清真傾蓋由來不棄貧看君共是青雲客應念悠悠失路人明老賦萬石岡蒼山西來爭駿奔衆峯獨有籌山尊連岡陂陲走闕陸參錯萬山如雲屯我疑秦人鞭石走平與人家作原阜又疑仙子遣羊羣有形猛若猛獸蹲乃知元氣自凝結異狀竒姿寒突兀闕不牣白雲根曉霧長迷𤣥豹穴曾聞山下有髙墳彭城餘慶多子孫聲名能與崇岡並他日當為萬石君樂府奉寄陳九梅江先輩古鏡蟠龍野苔色赭顏欲改青鬚白三尺魚腸燭下看玉壺擊碎心未寒悠悠漳水輪臺樹信陵平原渺何處騎射紛紛杜宛兒驕嘶紫燕躍青驪銅駝陌上香風暖田竇門前客應滿白頭執㦸不遷官盡日草𤣥門自間雪風蕭蕭面如割史雲桁上無全褐君不見羊腸九折坂又不見瞿塘灧澦湍萬古千秋行路難歌行贈别友湖中雪晴水始波湖上數峯間緑蘿緑蘿飛烟數千丈夜夜惟聞猿鳥多君家宛在青松際瀟灑山中無不至風流誰識漢王孫文采猶存建安氣五侯門外賔如雲羡君不過五侯門間中慣識麋鹿性夢裏長親鷗鳥羣閉門讀書寧自守未肯低頭縛塵綬應懷白璧重連城要取黃金大如斗文章於我亦何有踠足夷猶萬夫後飄流江海兩鬢蓬落拓風塵一杯酒别君此去春風回天涯碧草令人哀乃知萬事徒為爾獨愛孤雲歸去來秋胡妻妾家近叢臺生小邯鄲裏結髮事良人行當念終始自從十五到君前容華初未得君憐春風秋月長羞見况復行人去日邉昨憶送君往陳汝直謂君情暗相許何事青雲得路時相逢却問桑間女君思妾貌棄黃金河水東流知妾心寧將一死謝君去千古特為節婦針齊居喜故人陳希召見過仍贈别云積雨卷幽幔閉門間苔色病起離心正鬱陶出門喜見同袍客行客遙從海上來春風兩袖無塵埃乍開深竹沿花徑更掃間雲坐石苔悠悠烟水芳村下也似蕭條孟諸野幾度空吟碧海秋一壺具醉西齊夜憐君幽隱在瀛洲海嶼壺山愜勝遊籬下長栽陶令菊興來復上謝公樓仙人峯上近何如此去逢人好寄書莫將夢入青雲者忘却秋風揚子居行路難飲君玉壺酒聽我擊劒歌孝王賔客久寂寞梁園修竹今如何五陵年少無知己膠漆陳雷更誰是昨日青雲四五人棄我悠悠一杯水錦袍白馬何匆匆當街上馬坐春風並轡朝回雙闕下看花醉倒五陵東他人逐勢爭先後佇立道傍齊拜手君不見蘇秦未遇韓信貧流落江湖聊寄身一朝恩寵賜顏色豈得長為飄泊人江上吟間雲悠悠水浩浩二月江頭看花早畫楫蘭舟去復留玉甕銀瓶奈傾倒興來攜妓入中流急管青絲問楚謳青青菱荇浮翠漵兩兩鴛鴦貼遠洲百年世事東流水何似傾金長買醉梁苑歌鐘盡杳茫茂陵松柏空憔悴酒酣山水忽忘形何必滄浪歌獨醒更吹橫笛望空闊江楓寂歷江山青茫茫仙島無行路清水黃塵不知處欲向丹丘訪羽人身騎白鶴髙飛去送畫史林虛白歸嶼南佳君本是林泉客花嶼間居樂虛白幾年畫裏識君心此日尊前見顔色興來為寫輞川圖烟光潭影相糢糊不羡南宫稱小米更從物外驚方壺看君精藝有如此何乃鬱鬱栖窮途悠悠世事東流水欲向何門曳珠履梁苑歌鐘久不聞信陵賔客徒為爾白雲望望頻回首說道家林别來久斗酒臨岐且盡歡殷勤更問重來不聞友人尉吳門泮林才子閩州彥抱得麟經過淮甸自從典教入王門幾度春風候玉輦今年作縣下吳門吳門烟月倍離魂豈知梅福為仙尉莫學陶潛縱酒樽吳門憶昔扁舟度正是故人任官處丹楓江上碧天秋疏鐘聲外寒山暮嗟豫浪跡西復東年年道上隨飛蓬獻賦無因謁眀主彈冠自笑空龍鍾長洲苑外多佳致山水間時日應至宦遊莫比在長沙聖主恩深漢文帝夢遊天台東海窺蓬萊弱水浩蕩隱映金銀臺青山瞰吳越烟霞眀滅縹渺連天台天台岧嶤一萬八千丈蕩摩日月青雲上西傾泰華出蛾眉東拔嵩丘振雁蕩我昔傳聞心亦驚一夜飛夢遊赤城赤城孤月照我影送我迢迢度華頂華頂連天髙百越慿虛空兮見溟渤雲溟濛兮山欲雨波洶湧兮石飛雪深林層崖隂晦忽熊咆龍吟悲風發仙人其來兮紛紛揭華蓋兮爛垂雲綽約兮金母杳靄兮元君祕𤣥章兮緑字揮寶劒兮星文命廣成洗髓洪崖濯髮五粒松花飽豫肌骨忽抱雲璈飛上天俄然一笑三千年又作石橋别遙遙見金仙龍象何蹴踏天花雨翩翩遺豫舍利子鏗然金石堅逍遙上兜率列坐談空禪須㬰驚覺心亦碎秪疑枕席烟霞裏四壁蟲聲夜正分一簾月色寒如水天眀走馬入紅塵忘却仙遊夢時事題嶼南林遵性所贈墨竹憶昨南遊花嶼頭問耕堂上幾日留江雲渭樹無期别雨散星離空復愁渭川逸節何瀟灑多公遠寄山中者􅀢法偏凌與可前風流不在吳興下秋風野館間蕭蕭何以報之雙瓊瑤青山向夕捲幽幔明月入户窺參寥知君本是金門客何乃栖遲在泉石見畫令人重憶君秋風黃葉又紛紛送僧歸日本法師東南秀成行獨清苦一錫行挑貝葉書孤帆笑别扶桑樹茫茫海水無行路水月澄澄印禪悟經梵朝殘五老雲鉢盂夜洗三山雨隨緣忽復東歸去萬里鯨波一杯渡夜半龍吟丈室雲天邉鳥沒千峯曙塵緣未斷那可攀别後知師向何處山中喜故人繡衣使者見過谷口夜來雨閉門碧苔深單居絶儔侣鬱鬱愁我心臺中故人舊相得别來不道青雲隔驄毛駿馬繡衣裳飄飄來問山中客山中野人獨布衣十年分與故人稀薜蘿深庭開花徑猿鳥聲中候竹扉西遊不問行來久且喜林間一攜手幾度空看海上雲相逢好醉杯中酒酒酣擊劒歌未終樽前别思又匆匆羡君大隱金門裏嗟豫還卧青山中山中寥寥日將夕芳草萋萋謾相憶滿地殘花送馬蹄天涯目斷愁難極聞笛歌送人之塞上橫笛對離亭扁舟越江口月下何人最斷腸天涯怨别吹楊栁楊栁繁音愁復愁梧桐蕭瑟江楓秋長林半夜葉皆脫積水三江雲不流長夜漫漫聽未了變羽回宫猶嫋嫋越海天邉鳥不飛閩關月暗猿聲小須㬰一曲更凄清零落梅花滿楚城楚城迢迢接沙磧邉客聞之淚俱滴黃埃積雪暗長關絶域窮荒草根白此夜愁心獨對君眀朝悵别又離羣單于城上吹羌管知爾相思不忍聞筝人勸酒新豐美人青樓姬綘裙玉腕嬌雙眉暫歇秦箏勸郎酒西凉蒲萄金屈巵郎君但飲休辭醉百年悠悠醉中是神血朝凝不復知日暮青山北邙裏回身更整十三絃金雁離離繞鈿蟬十二闌干月將墜錦筵紅燭浮青烟人生歡樂那能久豈悟星纒倐忽走妾顔未改君少年日日樽前勸君酒書雲山小景山蟬聨兮青青水潺湲兮浩浩樹叢叢兮遠人烟雲漫漫兮飛鳥道嵐光暗曖兮霽人目黛色青蒼兮不堪掃微鍾逺兮東林歸帆邈兮仙島彼角巾兮逍遙誰同兮笑傲豫迷途兮既久愧還山兮不早何雲松兮可巢感吾生兮將老女耕田行鳴鳩喔喔屋上啼東鄰西舍把鋤犁兒家兄弟久邉戍數畝山田空草畦山田况是多磽確無人無牛廢耕作母今年老女未笄門户蕭條轉衰薄掩面含羞學種田道傍觀者盡垂憐去年潦旱妨秋稼盡鬻裙叉輸稅錢春來依舊愁辛苦竊向田頭拜田祖黃葛衣吹野草風青蒲笠帶山花雨路逢邉使忽悲傷聞道兒兄死戰場欲收兄骨向何處女身不及東家郎孀婦吟開篋見珠翠思君前日情只言恩愛長相顧豈悟音容隔死生東流逝水何時返倐忽青天彩雲散銅鏡粧臺不復窺羅襦綵被荒塵滿月眀蕙帳寒如水燈火熒熒照虛位寂寞空簾鵲影間蕭條窮巷蟲聲碎東鄰車馬如雲屯西鄰歌舞日紛紛不羡他家夫婦好寧甘守節在君門新墳峩峩倚林麓春去秋來草應緑夜半傷心不忍啼天明獨抱孤兒哭代閨人答輕薄少年繁花笑芳年蔓草對幽思妾本燕趙姿誤身任俠子長安任俠矜少年五花白馬黃金鞭平眀馳逐新豐市日晚吳姬壚上眠玉驄一别知何處可惜佳期夢中度笻竹丁香起暮猿枕屛十二巫山雨落盡冬青猶未回轉頭黃葉委蒼苔空簾盡日無人見寂寞黃昏月又來賦得劒津送浮丘鄭先生之江西考文閩溪迢迢掛絶壁平津之水深千尺神物湮沈不復知往往潭心飛霹靂銀河掩映流寒聲玻璃井上雙龍行九華山色分照耀丹楓寂歷秋風鳴吾夫子浮丘生送君幾度持文衡扁舟觸熱那可度來往津頭須濯纓梅城小景江城何人夜吹笛寒落梅花曉無跡仙嶠蒼茫隔海清人烟寂歷連秋色何處征帆天際歸夕陽楓樹鳥邉微磯頭亦有垂綸者甘向滄浪老布衣雙燕雙燕飛雙飛復雙栖瓊忩綵户九天上銜泥出入黃金扉那知繁華盡一旦失栖托柏梁寂寞吳宫焚飛飛去入誰家幕我心本憔悴顧汝兩傷悲何當化作比翼鳥翩翩復上青雲飛還山吟我所思兮商顔之峯首陽之岑烟霞眀滅傾洞不可極但見迸泉颯颯飛雨愁深林中有𤣥猿叫月鳴鶴在隂採芝行歌不復聽食薇遠引終難尋古來龍蠖皆有道至人舒卷應無心吾不能學蔡澤取卿相又不能學季子多黃金耦耕忘世志何潔楚狂歌鳳譏已深我欲還山發哀吟天冥冥兮雲隂沈白石兮粼粼流泉兮涔涔拂商羽兮絃素琴山之靈兮來賞音彼聾俗之顛倒兮樂淫淫駸駸吾將捐其袂解其襟脫蒼龍之佩荆玉之簮悵佳人於極浦涕淋浪而沾襟挽陳子賢清猿血滴泉中夜山靈怨死薜蘿罅辛夷吹烟香徑斜鬼燈明滅寒泉瀉玉樓帝遣迎仙魄劍挂殘星冷枝碧落月衣寒地下秋海天夢斷桐花夕草澤狂歌卷二
